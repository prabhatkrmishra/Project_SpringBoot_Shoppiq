<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Product Detail')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container">
            <div id="loadingState" class="text-center" style="padding:48px 0;">
                <div class="spinner"></div>
                <p class="text-muted mt-md">Loading product...</p>
            </div>

            <div id="errorState" class="empty-state" style="display:none;">
                <div class="empty-state-icon"><i data-lucide="package-x" class="icon-xl"></i></div>
                <h2>Product Not Found</h2>
                <p>The product you're looking for doesn't exist or has been removed.</p>
                <a th:href="@{/allitems}" class="btn btn-primary">Back to Shop</a>
            </div>

            <div id="itemDetail" class="item-detail" style="display:none;"></div>

            <div id="reviewsSection" style="display:none;" class="mt-xl">
                <div class="panel">
                    <div class="panel-title">Customer Reviews</div>
                    <div id="reviews-loading" class="flex-center" style="padding:1rem;">
                        <span class="spinner"></span>
                    </div>
                    <div id="reviews-list" style="display:none;"></div>
                    <div id="reviews-empty" class="text-center text-muted text-sm" style="display:none;padding:1rem;">No reviews yet. Be the first to review this product!</div>
                </div>

                <div sec:authorize="isAuthenticated() and !hasRole('SELLER') and !hasRole('ADMIN')" class="panel mt-lg">
                    <div class="panel-title">Write a Review</div>
                    <form id="review-form">
                        <div class="form-group">
                            <label class="form-label">Rating</label>
                            <div id="star-rating" class="star-rating" style="display:flex;gap:4px;cursor:pointer;">
                                <span class="star-input-item" data-star="1" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="1" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                                <span class="star-input-item" data-star="2" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="2" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                                <span class="star-input-item" data-star="3" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="3" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                                <span class="star-input-item" data-star="4" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="4" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                                <span class="star-input-item" data-star="5" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="5" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                            </div>
                            <input type="hidden" id="review-rating" value="0">
                        </div>
                        <div class="form-group">
                            <label for="review-text" class="form-label">Your Review <span class="text-muted">(optional)</span></label>
                            <textarea id="review-text" class="form-input" rows="4" maxlength="1000" placeholder="Tell others what you think about this product..." style="resize:vertical;"></textarea>
                        </div>
                        <button type="submit" id="review-submit-btn" class="btn btn-primary">Submit Review</button>
                    </form>
                </div>
            </div>

            <!-- Edit Review Modal -->
            <div id="editReviewModal" class="modal-overlay">
                <div class="modal" style="max-width:480px;width:90%;">
                    <div class="modal-header">
                        <h3>Edit Review</h3>
                        <button type="button" class="modal-close" id="editReviewClose">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">Rating</label>
                            <div id="edit-star-rating" class="star-rating" style="display:flex;gap:4px;cursor:pointer;">
                                <span class="star-input-item" data-star="1" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="1" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                                <span class="star-input-item" data-star="2" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="2" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                                <span class="star-input-item" data-star="3" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="3" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                                <span class="star-input-item" data-star="4" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="4" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                                <span class="star-input-item" data-star="5" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;"><i data-lucide="star" class="icon star-icon"></i><i data-lucide="star" class="icon star-icon filled" data-star-fg="5" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i></span>
                            </div>
                            <input type="hidden" id="edit-review-rating" value="0">
                        </div>
                        <div class="form-group">
                            <label for="edit-review-text" class="form-label">Your Review</label>
                            <textarea id="edit-review-text" class="form-input" rows="4" maxlength="1000" style="resize:vertical;"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="editReviewCancel">Cancel</button>
                        <button type="button" class="btn btn-primary" id="editReviewSave">Save Changes</button>
                    </div>
                </div>
            </div>

            <input type="hidden" id="currentUsername" sec:authorize="isAuthenticated()" th:value="${#authentication.name}">
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>

    <script>
    (function () {
      'use strict';
      var currentItemId = null;
      var selectedRating = 0;
      var editSelectedRating = 0;
      var currentUsername = '';
      var editingReviewId = null;

      function escapeHtml(s) { var d = document.createElement('div'); d.appendChild(document.createTextNode(s || '')); return d.innerHTML; }
      function escapeAttr(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

      function starHtml(rating, interactive) {
        var html = '';
        for (var i = 1; i <= 5; i++) {
          if (interactive) {
            html += '<span class="star-input-item" data-star="' + i + '" style="cursor:pointer;display:inline-flex;position:relative;width:24px;height:24px;">' +
              '<i data-lucide="star" class="icon star-icon"></i>' +
              '<i data-lucide="star" class="icon star-icon filled" data-star-fg="' + i + '" style="position:absolute;top:0;left:0;clip-path:inset(0 100% 0 0);pointer-events:none;"></i>' +
              '</span>';
          } else {
            if (i <= Math.floor(rating)) {
              html += '<i data-lucide="star" class="icon star-icon filled"></i>';
            } else if ((i - 0.5) <= rating) {
              html += '<span class="star-half-display" style="display:inline-flex;position:relative;width:24px;height:24px;">' +
                '<i data-lucide="star" class="icon star-icon"></i>' +
                '<i data-lucide="star" class="icon star-icon filled" style="position:absolute;top:0;left:0;clip-path:inset(0 50% 0 0);pointer-events:none;"></i>' +
                '</span>';
            } else {
              html += '<i data-lucide="star" class="icon star-icon"></i>';
            }
          }
        }
        return html;
      }

      function renderReviews(reviews) {
        document.getElementById('reviews-loading').style.display = 'none';
        var list = document.getElementById('reviews-list');
        var empty = document.getElementById('reviews-empty');
        if (!reviews || reviews.length === 0) {
          empty.style.display = '';
          return;
        }
        list.style.display = '';
        list.innerHTML = '';
        reviews.forEach(function (r) {
          var isOwner = currentUsername && r.reviewerUsername === currentUsername;
          var div = document.createElement('div');
          div.className = 'review-item';
          div.style.cssText = 'border-bottom:1px solid var(--border);padding:1rem 0;';
          div.innerHTML =
            (isOwner && r.status !== 'PENDING' ? '<div class="review-actions">' +
              '<button class="review-action-btn edit-review-btn" data-review-id="' + r.id + '" data-rating="' + r.rating + '" data-review="' + escapeAttr(r.review || '') + '" title="Edit review"><i data-lucide="pencil" class="icon-sm"></i></button>' +
              '<button class="review-action-btn review-action-danger delete-review-btn" data-review-id="' + r.id + '" title="Delete review"><i data-lucide="trash-2" class="icon-sm"></i></button>' +
              '</div>' : '') +
            '<div>' +
              '<div class="flex items-center gap-sm">' +
                '<strong>' + escapeHtml(r.reviewerName || r.reviewerUsername || 'Anonymous') + '</strong>' +
                '<span class="text-sm text-muted">' + formatDate(r.createdAt) + '</span>' +
                (r.status === 'PENDING' ? '<span class="badge badge-warning" style="font-size:0.65rem;">Pending Approval</span>' : '') +
              '</div>' +
              '<div class="star-rating-display" style="margin-top:8px;">' + starHtml(r.rating || 0, false) + '</div>' +
            '</div>' +
            (r.review ? '<p class="text-sm" style="margin:0.5rem 0 0;">' + escapeHtml(r.review) + '</p>' : '') +
            (isOwner && r.status === 'PENDING' ? '<div class="mt-sm"><span class="text-sm text-muted">Your review is awaiting admin approval.</span></div>' : '');
          list.appendChild(div);
        });
        if (typeof lucide !== 'undefined') lucide.createIcons();

        list.querySelectorAll('.edit-review-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            editingReviewId = this.dataset.reviewId;
            editSelectedRating = parseFloat(this.dataset.rating) || 0;
            document.getElementById('edit-review-rating').value = editSelectedRating;
            document.getElementById('edit-review-text').value = this.dataset.review || '';
            updateEditStars();
            document.getElementById('editReviewModal').classList.add('active');
          });
        });

        list.querySelectorAll('.delete-review-btn').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var rid = this.dataset.reviewId;
            showConfirmModal({ title: 'Delete Review', message: 'Are you sure you want to delete this review?', confirmText: 'Delete', danger: true }).then(function (confirmed) {
              if (!confirmed) return;
              API.del('/reviews/' + rid + '/delete').then(function () {
                showToast('Review deleted', 'success');
                loadReviews();
              }).catch(function (err) {
                showToast(err.message || 'Failed to delete review', 'error');
              });
            });
          });
        });
      }

      function updateEditStars() {
        var container = document.getElementById('edit-star-rating');
        if (!container) return;
        container.querySelectorAll('.star-input-item').forEach(function (item) {
          var starN = parseInt(item.dataset.star) || 0;
          var fg = item.querySelector('[data-star-fg]');
          if (!fg) return;
          if (starN <= Math.floor(editSelectedRating)) {
            fg.style.clipPath = 'inset(0 0% 0 0)';
          } else if ((starN - 0.5) <= editSelectedRating) {
            fg.style.clipPath = 'inset(0 50% 0 0)';
          } else {
            fg.style.clipPath = 'inset(0 100% 0 0)';
          }
        });
      }

      function setupEditStarRating() {
        var container = document.getElementById('edit-star-rating');
        if (!container) return;
        container.addEventListener('click', function (e) {
          var item = e.target.closest('.star-input-item');
          if (!item) return;
          var starN = parseInt(item.dataset.star) || 0;
          var rect = item.getBoundingClientRect();
          var x = e.clientX - rect.left;
          editSelectedRating = x < rect.width / 2 ? starN - 0.5 : starN;
          document.getElementById('edit-review-rating').value = editSelectedRating;
          updateEditStars();
        });
      }

      function loadReviews() {
        if (!currentItemId) return;
        document.getElementById('reviewsSection').style.display = '';
        document.getElementById('reviews-loading').style.display = '';
        API.get('/items/' + currentItemId + '/reviews').then(renderReviews).catch(function () {
          document.getElementById('reviews-loading').style.display = 'none';
          document.getElementById('reviews-empty').style.display = '';
        });
      }

      function setupStarRating() {
        var container = document.getElementById('star-rating');
        if (!container) return;
        function highlightStars(upTo) {
          container.querySelectorAll('.star-input-item').forEach(function (item) {
            var starN = parseInt(item.dataset.star) || 0;
            var fg = item.querySelector('[data-star-fg]');
            if (!fg) return;
            if (starN <= Math.floor(upTo)) {
              fg.style.clipPath = 'inset(0 0% 0 0)';
            } else if ((starN - 0.5) <= upTo) {
              fg.style.clipPath = 'inset(0 50% 0 0)';
            } else {
              fg.style.clipPath = 'inset(0 100% 0 0)';
            }
          });
        }
        container.addEventListener('click', function (e) {
          var item = e.target.closest('.star-input-item');
          if (!item) return;
          var starN = parseInt(item.dataset.star) || 0;
          var rect = item.getBoundingClientRect();
          var x = e.clientX - rect.left;
          selectedRating = x < rect.width / 2 ? starN - 0.5 : starN;
          document.getElementById('review-rating').value = selectedRating;
          highlightStars(selectedRating);
        });
        container.addEventListener('mousemove', function (e) {
          var item = e.target.closest('.star-input-item');
          if (!item) { highlightStars(selectedRating); return; }
          var starN = parseInt(item.dataset.star) || 0;
          var rect = item.getBoundingClientRect();
          var x = e.clientX - rect.left;
          var hoverVal = x < rect.width / 2 ? starN - 0.5 : starN;
          highlightStars(hoverVal);
        });
        container.addEventListener('mouseleave', function () {
          highlightStars(selectedRating);
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        var usernameEl = document.getElementById('currentUsername');
        if (usernameEl) currentUsername = usernameEl.value || '';
        var isAuthenticated = usernameEl !== null;

        var pathParts = window.location.pathname.split('/');
        var itemId = pathParts[pathParts.length - 1];
        currentItemId = itemId;

        API.get('/items/' + itemId).then(function (item) {
          document.title = escapeHtml(item.name) + ' — Shoppiq';
          var imgUrl = item.imageUrl || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600&h=600&fit=crop';
          var hasDiscount = item.discountPercentage && parseFloat(item.discountPercentage) > 0;
          var stockClass = item.stockQuantity > 10 ? 'text-success' : (item.stockQuantity > 0 ? 'text-warning' : 'text-danger');
          var stockText = item.stockQuantity > 10 ? 'In Stock (' + item.stockQuantity + ' available)' : (item.stockQuantity > 0 ? 'Low Stock (' + item.stockQuantity + ' left)' : 'Out of Stock');
          var catLink = item.category ? '<a href="/category/' + escapeAttr(item.category.slug) + '">' + escapeHtml(item.category.name) + '</a>' : '';

          document.getElementById('itemDetail').innerHTML =
            '<nav class="breadcrumbs" aria-label="Breadcrumb">' +
            '<a href="/">Home</a><span class="separator"><i data-lucide="chevron-right" class="icon-sm"></i></span>' +
            '<a href="/allitems">Shop</a><span class="separator"><i data-lucide="chevron-right" class="icon-sm"></i></span>' +
            (catLink ? catLink + '<span class="separator"><i data-lucide="chevron-right" class="icon-sm"></i></span>' : '') +
            '<span class="current">' + escapeHtml(item.name) + '</span>' +
            '</nav>' +
            '<div class="item-detail-grid">' +
            '<div class="item-detail-image"><div class="card-image-wrapper">' +
            '<img class="card-image" src="' + escapeAttr(imgUrl) + '" alt="' + escapeAttr(item.name) + '" loading="lazy" width="600" height="600">' +
            (hasDiscount ? '<span class="card-badge badge badge-success"><i data-lucide="tag" class="icon-sm"></i> ' + escapeHtml(String(item.discountPercentage)) + '% Off</span>' : '') +
            '</div></div>' +
            '<div class="item-detail-info">' +
            (item.category ? '<span class="badge badge-neutral">' + escapeHtml(item.category.name) + '</span>' : '') +
            '<h1 class="item-detail-title">' + escapeHtml(item.name) + '</h1>' +
            '<div class="item-detail-price"><span class="price-current">$' + escapeHtml(String(item.price)) + '</span>' +
            (hasDiscount ? ' <span class="badge badge-success">' + escapeHtml(String(item.discountPercentage)) + '% Off</span>' : '') +
            '</div>' +
            '<div class="item-detail-meta">' +
            (item.brand ? '<div class="item-detail-meta-row"><i data-lucide="building-2" class="icon-sm text-muted"></i><span class="text-muted">Brand:</span><span>' + escapeHtml(item.brand) + '</span></div>' : '') +
            (item.sku ? '<div class="item-detail-meta-row"><i data-lucide="barcode" class="icon-sm text-muted"></i><span class="text-muted">SKU:</span><span>' + escapeHtml(item.sku) + '</span></div>' : '') +
            '<div class="item-detail-meta-row"><i data-lucide="package" class="icon-sm text-muted"></i><span class="text-muted">Stock:</span><span class="' + stockClass + '">' + stockText + '</span></div>' +
            '</div>' +
            (item.description ? '<div class="item-detail-description"><h3>Description</h3><p>' + escapeHtml(item.description) + '</p></div>' : '') +
            (isAuthenticated ?
              '<div class="item-detail-actions">' +
              '<form class="item-detail-form" id="add-to-cart-form">' +
              '<div class="qty-controls">' +
              '<button type="button" class="qty-minus" aria-label="Decrease quantity"><i data-lucide="minus" class="icon-sm"></i></button>' +
              '<input type="number" id="qtyInput" name="quantity" value="1" min="1" max="99" class="form-input qty-input" aria-label="Quantity">' +
              '<button type="button" class="qty-plus" aria-label="Increase quantity"><i data-lucide="plus" class="icon-sm"></i></button>' +
              '</div>' +
              '<button type="submit" class="btn btn-primary btn-lg"' + (item.stockQuantity == null || item.stockQuantity == 0 ? ' disabled' : '') + '><i data-lucide="shopping-cart" class="icon-sm"></i> Add to Cart</button>' +
              '</form>' +
              '</div>' :
              '<div class="item-detail-actions">' +
              '<a href="/login" class="btn btn-primary btn-lg btn-block"><i data-lucide="log-in" class="icon-sm"></i> Sign in to Purchase</a>' +
              '</div>') +
            '</div>' +
            '</div>';

          document.getElementById('itemDetail').style.display = '';
          if (typeof lucide !== 'undefined') lucide.createIcons();

          var addToCartForm = document.getElementById('add-to-cart-form');
          if (addToCartForm) {
            addToCartForm.addEventListener('submit', function (e) {
              e.preventDefault();
              var qty = parseInt(document.getElementById('qtyInput').value) || 1;
              API.post('/user/cart/create', { itemDetailsId: item.itemDetailsId, quantity: qty }).then(function () {
                showToast('Added to cart', 'success');
              }).catch(function (err) {
                showToast(err.message || 'Could not add to cart', 'error');
              });
            });

            var qtyInput = document.getElementById('qtyInput');
            var minusBtn = document.querySelector('.qty-minus');
            var plusBtn = document.querySelector('.qty-plus');
            if (minusBtn) minusBtn.addEventListener('click', function () { qtyInput.value = Math.max(1, parseInt(qtyInput.value) - 1); });
            if (plusBtn) plusBtn.addEventListener('click', function () { qtyInput.value = Math.min(99, parseInt(qtyInput.value) + 1); });
          }

          loadReviews();
          setupStarRating();
          setupEditStarRating();
        }).catch(function () {
          document.getElementById('errorState').style.display = '';
        }).finally(function () {
          document.getElementById('loadingState').style.display = 'none';
        });

        var reviewForm = document.getElementById('review-form');
        if (reviewForm) {
          reviewForm.addEventListener('submit', function (e) {
            e.preventDefault();
            if (selectedRating < 0.5) { showToast('Please select a rating', 'error'); return; }
            var btn = document.getElementById('review-submit-btn');
            setButtonLoading(btn, true);
            API.post('/items/' + currentItemId + '/create/review', {
              rating: selectedRating,
              review: document.getElementById('review-text').value.trim()
            }).then(function () {
              showToast('Review submitted!', 'success');
              document.getElementById('review-text').value = '';
              selectedRating = 0;
              document.getElementById('review-rating').value = 0;
              document.getElementById('star-rating').querySelectorAll('[data-star-fg]').forEach(function (s) { s.style.clipPath = 'inset(0 100% 0 0)'; });
              loadReviews();
              setButtonLoading(btn, false);
            }).catch(function (err) {
              showToast(err.message || 'Failed to submit review', 'error');
              setButtonLoading(btn, false);
            });
          });
        }

        var editReviewClose = document.getElementById('editReviewClose');
        if (editReviewClose) {
          editReviewClose.addEventListener('click', function () {
            document.getElementById('editReviewModal').classList.remove('active');
          });
        }
        var editReviewCancel = document.getElementById('editReviewCancel');
        if (editReviewCancel) {
          editReviewCancel.addEventListener('click', function () {
            document.getElementById('editReviewModal').classList.remove('active');
          });
        }
        var editReviewSave = document.getElementById('editReviewSave');
        if (editReviewSave) {
          editReviewSave.addEventListener('click', function () {
            if (editSelectedRating < 0.5) { showToast('Please select a rating', 'error'); return; }
            var btn = this;
            setButtonLoading(btn, true);
            API.put('/reviews/' + editingReviewId + '/update', {
              rating: editSelectedRating,
              review: document.getElementById('edit-review-text').value.trim()
            }).then(function () {
              showToast('Review updated!', 'success');
              document.getElementById('editReviewModal').classList.remove('active');
              setButtonLoading(btn, false);
              loadReviews();
            }).catch(function (err) {
              showToast(err.message || 'Failed to update review', 'error');
              setButtonLoading(btn, false);
            });
          });
        }
      });
    })();
    </script>
</body>
</html>
