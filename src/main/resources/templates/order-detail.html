<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Order Detail')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container container-narrow">
            <div id="order-loading" class="flex-center" style="padding:3rem;">
                <span class="spinner"></span>
            </div>

            <div id="order-content" style="display:none;">
                <div class="page-header">
                    <h1>Order #<span id="order-id"></span></h1>
                    <div class="flex items-center gap-sm">
                        <span class="badge" id="order-status"></span>
                        <span class="text-muted text-sm" id="order-date"></span>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">Order Items</div>
                    <div id="order-items"></div>
                </div>

                <div class="panel">
                    <div class="panel-title">Order Summary</div>
                    <div class="cart-summary-row"><span>Subtotal</span><span id="order-subtotal">$0.00</span></div>
                    <div class="cart-summary-row"><span>Shipping</span><span id="order-shipping">$0.00</span></div>
                    <div class="cart-summary-row" id="order-discount-row" style="display:none;"><span>Discount</span><span class="discount" id="order-discount">-$0.00</span></div>
                    <div class="cart-summary-row total"><span>Total</span><span id="order-total">$0.00</span></div>
                </div>

                <div class="panel" id="order-address-panel" style="display:none;">
                    <div class="panel-title">Shipping Address</div>
                    <p class="text-sm" style="margin:0;" id="order-address"></p>
                </div>

                <div class="mt-lg flex gap-sm">
                    <a id="admin-back-link" href="/admin/orders" class="btn btn-secondary" style="display:none;">&larr; Back to Order Management</a>
                    <a id="back-link" href="/orders" class="btn btn-secondary">&larr; Back to Orders</a>
                    <button id="cancel-order-btn" class="btn btn-danger" style="display:none;">Request Cancellation</button>
                    <button id="return-order-btn" class="btn btn-warning" style="display:none;">Request Return</button>
                    <button id="refund-order-btn" class="btn btn-warning" style="display:none;">Request Refund</button>
                    <button id="replace-order-btn" class="btn btn-primary" style="display:none;">Request Replacement</button>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
    <script>
    (function () {
      'use strict';
      function badgeClass(status) {
        if (status === 'DELIVERED' || status === 'COMPLETED') return 'badge-success';
        if (status === 'CANCELLED' || status === 'RETURNED' || status === 'REFUNDED' || status === 'REPLACED') return 'badge-danger';
        if (status === 'CANCEL_REQUEST' || status === 'RETURN_REQUEST' || status === 'REFUND_REQUEST' || status === 'REPLACE_REQUEST') return 'badge-info';
        if (status === 'RETURN_PICKUP' || status === 'REPLACE_PICKUP') return 'badge-info';
        return 'badge-warning';
      }
      function renderOrder(order) {
        document.getElementById('order-loading').style.display = 'none';
        document.getElementById('cancel-order-btn').style.display = 'none';
        document.getElementById('return-order-btn').style.display = 'none';
        document.getElementById('refund-order-btn').style.display = 'none';
        document.getElementById('replace-order-btn').style.display = 'none';
        document.getElementById('order-content').style.display = '';
        document.getElementById('order-id').textContent = order.id;
        var statusEl = document.getElementById('order-status');
        statusEl.textContent = order.status;
        statusEl.className = 'badge ' + badgeClass(order.status);
        document.getElementById('order-date').textContent = formatDate(order.placedAt);
        document.getElementById('order-subtotal').textContent = formatCurrency(order.subtotal);
        document.getElementById('order-shipping').textContent = formatCurrency(order.shippingFee);
        document.getElementById('order-total').textContent = formatCurrency(order.grandTotal);
        if (order.discount && parseFloat(order.discount) > 0) {
          document.getElementById('order-discount-row').style.display = '';
          document.getElementById('order-discount').textContent = '-' + formatCurrency(order.discount);
        }
        if (order.address) {
          document.getElementById('order-address-panel').style.display = '';
          var a = order.address;
          document.getElementById('order-address').textContent =
            (a.fullName || '') + '\n' +
            (a.line1 || '') + (a.line2 ? ', ' + a.line2 : '') + '\n' +
            (a.city || '') + ', ' + (a.state || '') + ' ' + (a.postalCode || '') + '\n' +
            (a.country || '');
        } else {
          document.getElementById('order-address-panel').style.display = '';
          document.getElementById('order-address').textContent = 'Address not available';
        }
        var itemsContainer = document.getElementById('order-items');
        itemsContainer.innerHTML = '';
        (order.orderItems || []).forEach(function (item) {
          var imgUrl = item.imageUrl || 'https://plus.unsplash.com/premium_photo-1683746792239-6ce8cdd3ac78?q=80&w=48&fit=crop';
          var div = document.createElement('div');
          div.className = 'order-review-item';
          div.innerHTML =
            '<img class="item-thumb" src="' + imgUrl + '" alt="" loading="lazy" width="48" height="48">' +
            '<div class="item-info">' +
              '<div class="item-name">' + (item.itemNameSnapshot || 'Product') + '</div>' +
              '<div class="item-qty">Qty: ' + item.quantity + '</div>' +
            '</div>' +
            '<div class="item-price">' + formatCurrency(item.subtotal) + '</div>';
          itemsContainer.appendChild(div);
        });
        if (order.status === 'PLACED' && new URLSearchParams(window.location.search).get('admin') !== 'true') {
          var cancelBtn = document.getElementById('cancel-order-btn');
          cancelBtn.style.display = '';
          cancelBtn.onclick = function () {
            showConfirmModal({ title: 'Request Cancellation', message: 'Request cancellation for this order?', confirmText: 'Request Cancellation', danger: true }).then(function (confirmed) {
              if (!confirmed) return;
              setButtonLoading(cancelBtn, true);
              API.put('/user/order/cancel/' + order.id).then(function () {
                showToast('Cancellation requested', 'success');
                renderOrder(Object.assign(order, { status: 'CANCEL_REQUEST' }));
              }).catch(function (err) {
                showToast(err.message || 'Failed to request cancellation', 'error');
                setButtonLoading(cancelBtn, false);
              });
            });
          };
        }
        if (order.status === 'DELIVERED' && new URLSearchParams(window.location.search).get('admin') !== 'true') {
          var returnBtn = document.getElementById('return-order-btn');
          returnBtn.style.display = '';
          returnBtn.onclick = function () {
            showConfirmModal({ title: 'Request Return', message: 'Request a return for this order?', confirmText: 'Request Return' }).then(function (confirmed) {
              if (!confirmed) return;
              setButtonLoading(returnBtn, true);
              API.put('/user/order/return/' + order.id).then(function () {
                showToast('Return requested', 'success');
                renderOrder(Object.assign(order, { status: 'RETURN_REQUEST' }));
              }).catch(function (err) {
                showToast(err.message || 'Failed to request return', 'error');
                setButtonLoading(returnBtn, false);
              });
            });
          };
          var refundBtn = document.getElementById('refund-order-btn');
          refundBtn.style.display = '';
          refundBtn.onclick = function () {
            showConfirmModal({ title: 'Request Refund', message: 'Request a refund for this order?', confirmText: 'Request Refund' }).then(function (confirmed) {
              if (!confirmed) return;
              setButtonLoading(refundBtn, true);
              API.put('/user/order/refund/' + order.id).then(function () {
                showToast('Refund requested', 'success');
                renderOrder(Object.assign(order, { status: 'REFUND_REQUEST' }));
              }).catch(function (err) {
                showToast(err.message || 'Failed to request refund', 'error');
                setButtonLoading(refundBtn, false);
              });
            });
          };
          var replaceBtn = document.getElementById('replace-order-btn');
          replaceBtn.style.display = '';
          replaceBtn.onclick = function () {
            showConfirmModal({ title: 'Request Replacement', message: 'Request a replacement for this order?', confirmText: 'Request Replacement' }).then(function (confirmed) {
              if (!confirmed) return;
              setButtonLoading(replaceBtn, true);
              API.put('/user/order/replace/' + order.id).then(function () {
                showToast('Replacement requested', 'success');
                renderOrder(Object.assign(order, { status: 'REPLACE_REQUEST' }));
              }).catch(function (err) {
                showToast(err.message || 'Failed to request replacement', 'error');
                setButtonLoading(replaceBtn, false);
              });
            });
          };
        }
      }
      document.addEventListener('DOMContentLoaded', function () {
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id');
        if (!id) {
          document.getElementById('order-loading').style.display = 'none';
          showToast('No order ID specified', 'error');
          return;
        }
        if (params.get('admin') === 'true') {
          document.getElementById('admin-back-link').style.display = '';
          document.getElementById('back-link').style.display = 'none';
          document.getElementById('cancel-order-btn').style.display = 'none';
          document.getElementById('return-order-btn').style.display = 'none';
          document.getElementById('refund-order-btn').style.display = 'none';
          document.getElementById('replace-order-btn').style.display = 'none';
        }
        API.get('/user/order/get/' + id).then(renderOrder).catch(function (err) {
          document.getElementById('order-loading').style.display = 'none';
          showToast(err.message || 'Failed to load order', 'error');
        });
      });
    })();
    </script>
</body>
</html>
