<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Seller Products')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="seller-main">
        <div class="seller-header">
            <div>
                <h1>Products</h1>
                <p>Manage your product catalog</p>
            </div>
            <button class="btn btn-primary" id="show-add-form-btn">+ Add Product</button>
        </div>

        <div class="admin-panel">
            <div class="admin-panel-title">Your Products</div>
            <div class="table-responsive">
                <table class="seller-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-body">
                        <tr>
                            <td colspan="6" class="text-center text-muted">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div id="products-pagination"></div>
        </div>

        <div class="admin-panel" id="add-product-panel" style="display:none;">
            <div class="admin-panel-title">Add New Product</div>
            <form id="add-product-form" class="seller-product-form">
                <div class="form-section">
                    <div class="form-group">
                        <label for="name" class="form-label">Product Name *</label>
                        <input type="text" id="name" name="name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="description" class="form-label">Description *</label>
                        <textarea id="description" name="description" class="form-textarea" rows="4"
                                  required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="brand" class="form-label">Brand *</label>
                            <input type="text" id="brand" name="brand" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="sku" class="form-label">SKU *</label>
                            <input type="text" id="sku" name="sku" class="form-input" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="price" class="form-label">Price *</label>
                            <input type="number" id="price" name="price" class="form-input" step="0.01" min="0"
                                   required>
                        </div>
                        <div class="form-group">
                            <label for="discountPercentage" class="form-label">Discount %</label>
                            <input type="number" id="discountPercentage" name="discountPercentage" class="form-input"
                                   step="0.01" min="0" max="100" value="0">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="categoryId" class="form-label">Category *</label>
                            <select id="categoryId" name="categoryId" class="form-select" required>
                                <option value="">Select category</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="stockQuantity" class="form-label">Stock Quantity</label>
                            <input type="number" id="stockQuantity" name="stockQuantity" class="form-input" min="0"
                                   value="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="imageUrl" class="form-label">Image URL</label>
                        <input type="url" id="imageUrl" name="imageUrl" class="form-input"
                               placeholder="https://example.com/image.jpg">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" id="submit-product-btn">Add Product</button>
            </form>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
    <script src="/js/sanitize.js"></script>
    <script th:src="@{/js/pagination.js}"></script>
    <script>
        (function () {
            'use strict';
            var categories = [];
            var editingId = null;
            var currentPage = 0;
            var PAGE_SIZE = 15;

            function statusClass(enabled) {
                return enabled ? 'active' : 'inactive';
            }

            function stockClass(qty) {
                return qty > 10 ? 'badge badge-success' : (qty > 0 ? 'badge badge-warning' : 'badge badge-danger');
            }

            function openForm(product) {
                var panel = document.getElementById('add-product-panel');
                var title = panel.querySelector('.admin-panel-title');
                var submitBtn = document.getElementById('submit-product-btn');
                if (product) {
                    editingId = product.id;
                    title.textContent = 'Edit Product';
                    submitBtn.textContent = 'Update Product';
                    document.getElementById('name').value = product.name || '';
                    document.getElementById('description').value = product.description || '';
                    document.getElementById('brand').value = product.brand || '';
                    document.getElementById('sku').value = product.sku || '';
                    document.getElementById('price').value = product.price || '';
                    document.getElementById('stockQuantity').value = product.stockQuantity || 0;
                    document.getElementById('discountPercentage').value = product.discountPercentage || 0;
                    document.getElementById('imageUrl').value = product.imageUrl || '';
                    var sel = document.getElementById('categoryId');
                    if (product.category) {
                        sel.value = product.category.id;
                    }
                } else {
                    editingId = null;
                    title.textContent = 'Add New Product';
                    submitBtn.textContent = 'Add Product';
                    document.getElementById('add-product-form').reset();
                }
                panel.style.display = '';
            }

            function renderProducts(products) {
                var tbody = document.getElementById('products-body');
                if (!products || products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No products yet.</td></tr>';
                    return;
                }
                tbody.innerHTML = '';
                products.forEach(function (p) {
                    var tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td><a href="/item/' + p.id + '" class="btn-link">' + escapeHtml(p.name || '') + '</a></td>' +
                        '<td class="text-sm">' + escapeHtml(p.category ? p.category.name : '') + '</td>' +
                        '<td>' + formatCurrency(p.price) + '</td>' +
                        '<td><span class="' + stockClass(p.stockQuantity) + '">' + p.stockQuantity + '</span></td>' +
                        '<td><span class="status-badge ' + statusClass(p.publishingStatus === 'PUBLISHED') + '">' + (p.publishingStatus || 'DRAFT') + '</span></td>' +
                        '<td class="admin-table-actions">' +
                        '<button class="btn btn-sm btn-secondary edit-product-btn" data-product-id="' + p.id + '">Edit</button> ' +
                        '<button class="btn btn-sm btn-danger delete-product-btn" data-product-id="' + p.id + '">Delete</button>' +
                        '</td>';
                    tbody.appendChild(tr);
                });
                tbody.querySelectorAll('.edit-product-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = this.dataset.productId;
                        API.get('/seller/products/' + id).then(function (product) {
                            openForm(product);
                        }).catch(function (e) {
                            showToast(e.message || 'Failed to load product', 'error');
                        });
                    });
                });
                tbody.querySelectorAll('.delete-product-btn').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = this.dataset.productId;
                        showConfirmModal({
                            title: 'Delete Product',
                            message: 'Delete this product permanently?',
                            confirmText: 'Delete',
                            danger: true
                        }).then(function (confirmed) {
                            if (!confirmed) return;
                            API.del('/seller/products/delete/' + id).then(function () {
                                showToast('Product deleted', 'success');
                                loadProducts();
                            }).catch(function (e) {
                                showToast(e.message, 'error');
                            });
                        });
                    });
                });
            }

            function loadProducts(page) {
                if (page != null) currentPage = page;
                API.get('/seller/products?page=' + currentPage + '&size=' + PAGE_SIZE).then(function (data) {
                    var items = data && data.content ? data.content : [];
                    renderProducts(items);
                    Pagination.render('products-pagination', data, loadProducts, {
                        onPageSizeChange: function (newSize) {
                            PAGE_SIZE = newSize;
                            loadProducts(0);
                        }
                    });
                }).catch(function (e) {
                    document.getElementById('products-body').innerHTML =
                        '<tr><td colspan="6" class="text-center text-muted">Failed to load products</td></tr>';
                });
            }

            document.addEventListener('DOMContentLoaded', function () {
                loadProducts();
                API.get('/categories/all').then(function (cats) {
                    categories = cats || [];
                    var sel = document.getElementById('categoryId');
                    categories.forEach(function (c) {
                        var opt = document.createElement('option');
                        opt.value = c.id;
                        opt.textContent = c.name;
                        sel.appendChild(opt);
                    });
                }).catch(function () {
                });

                document.getElementById('show-add-form-btn').addEventListener('click', function () {
                    openForm(null);
                });

                document.getElementById('add-product-form').addEventListener('submit', function (e) {
                    e.preventDefault();
                    var btn = document.getElementById('submit-product-btn');
                    setButtonLoading(btn, true);
                    var payload = {
                        name: document.getElementById('name').value,
                        description: document.getElementById('description').value,
                        brand: document.getElementById('brand').value,
                        sku: document.getElementById('sku').value,
                        price: parseFloat(document.getElementById('price').value),
                        stockQuantity: parseInt(document.getElementById('stockQuantity').value) || 0,
                        discountPercentage: parseFloat(document.getElementById('discountPercentage').value) || 0,
                        imageUrl: document.getElementById('imageUrl').value || null,
                        categoryId: parseInt(document.getElementById('categoryId').value)
                    };
                    var promise = editingId
                        ? API.put('/seller/products/update/' + editingId, payload)
                        : API.post('/seller/products/create', payload);
                    promise.then(function (resp) {
                        showToast(editingId ? 'Product updated' : 'Product added!', 'success');
                        if (resp && resp.publishingStatus === 'DRAFT') {
                            showToast('This edit will be reviewed by an admin before going live', 'info');
                        }
                        document.getElementById('add-product-form').reset();
                        document.getElementById('add-product-panel').style.display = 'none';
                        editingId = null;
                        setButtonLoading(btn, false);
                        loadProducts();
                    }).catch(function (err) {
                        showToast(err.message || 'Failed to save product', 'error');
                        setButtonLoading(btn, false);
                    });
                });
            });
        })();
    </script>
</body>
</html>
