<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Reports & Analytics')}"></head>
<body>
<th:block th:replace="~{fragments/admin-header :: admin-header('reports')}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="admin-main">
  <div class="page-header">
    <h1>Reports & Analytics</h1>
    <p>View sales reports, trends, and performance metrics</p>
  </div>

  <div class="admin-filters mb-md">
    <label class="text-sm">From: <input type="date" id="startDate" class="form-input" style="display:inline-block;width:auto;"></label>
    <label class="text-sm ml-sm">To: <input type="date" id="endDate" class="form-input" style="display:inline-block;width:auto;"></label>
    <button class="btn btn-sm btn-primary ml-sm" id="load-report-btn">Load Report</button>
  </div>

  <div class="admin-summary-grid">
    <div class="summary-card"><div class="label">Total Revenue</div><div class="value success" id="stat-revenue">$0</div></div>
    <div class="summary-card"><div class="label">Total Orders</div><div class="value" id="stat-orders">0</div></div>
    <div class="summary-card"><div class="label">Avg. Order Value</div><div class="value" id="stat-avg">$0</div></div>
    <div class="summary-card"><div class="label">Products Sold</div><div class="value" id="stat-products-sold">0</div></div>
  </div>

  <div class="admin-panel">
    <div class="admin-panel-title">Sales Overview</div>
    <div class="chart-container" style="position:relative;height:300px;">
      <canvas id="salesChart"></canvas>
    </div>
  </div>

  <div class="admin-panel">
    <div class="admin-panel-title">Top Selling Products</div>
    <div class="table-responsive">
      <table class="admin-table">
        <thead>
          <tr><th>Product</th><th>Units Sold</th><th>Revenue</th></tr>
        </thead>
        <tbody id="products-body">
          <tr><td colspan="3" class="text-center text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="admin-filters justify-end mt-md">
    <label class="text-sm">Export type:
      <select id="export-type" class="form-input" style="display:inline-block;width:auto;">
        <option value="SALES">Sales</option>
        <option value="REVENUE">Revenue</option>
        <option value="PRODUCT">Product</option>
        <option value="CUSTOMER">Customer</option>
        <option value="INVENTORY">Inventory</option>
      </select>
    </label>
    <button class="btn btn-sm btn-secondary ml-sm" id="export-csv-btn">Export as CSV</button>
    <button class="btn btn-sm btn-secondary ml-sm" id="export-pdf-btn">Export as PDF</button>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
(function () {
  'use strict';
  var dateParams = '';
  var salesChart = null;

  function updateDateParams() {
    var start = document.getElementById('startDate').value;
    var end = document.getElementById('endDate').value;
    if (start && end) {
      dateParams = '&startDate=' + start + '&endDate=' + end;
    } else {
      dateParams = '';
    }
  }

  function renderChart(dailySales) {
    var ctx = document.getElementById('salesChart');
    if (!ctx || !dailySales) return;
    var labels = Object.keys(dailySales).sort();
    var revenues = labels.map(function (d) { return dailySales[d].revenue || 0; });
    var orders = labels.map(function (d) { return dailySales[d].orders || 0; });
    if (salesChart) salesChart.destroy();
    salesChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Revenue ($)', data: revenues, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3, yAxisID: 'y' },
          { label: 'Orders', data: orders, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.3, yAxisID: 'y1' }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        scales: {
          y: { position: 'left', title: { display: true, text: 'Revenue ($)' } },
          y1: { position: 'right', title: { display: true, text: 'Orders' }, grid: { drawOnChartArea: false } }
        }
      }
    });
  }

  function loadReport() {
    updateDateParams();
    var salesUrl = '/api/admin/reports/sales?' + (dateParams ? dateParams.substring(1) : 'startDate=&endDate=');
    var productsUrl = '/api/admin/reports/products?' + (dateParams ? dateParams.substring(1) : 'startDate=&endDate=');

    API.get(salesUrl).then(function (s) {
      if (s) {
        document.getElementById('stat-revenue').textContent = formatCurrency(s.totalRevenue || 0);
        document.getElementById('stat-orders').textContent = s.totalOrders || 0;
        var avg = s.totalOrders > 0 ? (parseFloat(s.totalRevenue) / s.totalOrders) : 0;
        document.getElementById('stat-avg').textContent = formatCurrency(avg);
        var totalProducts = 0;
        if (s.topProducts) s.topProducts.forEach(function (p) { totalProducts += (p.quantitySold || 0); });
        document.getElementById('stat-products-sold').textContent = totalProducts;
        renderChart(s.dailySales);
      }
    }).catch(function () {});

    API.get(productsUrl).then(function (p) {
      var products = p && p.topProducts ? p.topProducts : [];
      var tbody = document.getElementById('products-body');
      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">No data available</td></tr>';
        return;
      }
      tbody.innerHTML = '';
      products.forEach(function (prod) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td><a href="/item/' + (prod.itemId || prod.id || '') + '" class="btn-link">' + (prod.itemName || prod.name || '') + '</a></td>' +
          '<td>' + (prod.totalQuantitySold || prod.unitsSold || 0) + '</td>' +
          '<td>' + formatCurrency(prod.totalRevenue || prod.revenue || 0) + '</td>';
        tbody.appendChild(tr);
      });
    }).catch(function () {
      document.getElementById('products-body').innerHTML =
        '<tr><td colspan="3" class="text-center text-muted">Failed to load report</td></tr>';
    });
  }

  function downloadBlob(url, filename) {
    API.getBlob(url).then(function (blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }).catch(function (e) { showToast(e.message || 'Download failed', 'error'); });
  }

  document.addEventListener('DOMContentLoaded', function () {
    var today = new Date();
    var thirtyDaysAgo = new Date(today);
    thirtyDaysAgo.setDate(today.getDate() - 30);
    document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
    document.getElementById('endDate').value = today.toISOString().split('T')[0];
    loadReport();

    document.getElementById('load-report-btn').addEventListener('click', loadReport);

    document.getElementById('export-csv-btn').addEventListener('click', function () {
      updateDateParams();
      var type = document.getElementById('export-type').value;
      var base = '/api/admin/reports/export?type=' + type + '&format=CSV' + dateParams;
      downloadBlob(base, type.toLowerCase() + '-report.csv');
    });
    document.getElementById('export-pdf-btn').addEventListener('click', function () {
      updateDateParams();
      var type = document.getElementById('export-type').value;
      var base = '/api/admin/reports/export?type=' + type + '&format=PDF' + dateParams;
      downloadBlob(base, type.toLowerCase() + '-report.pdf');
    });
  });
})();
</script>
</body>
</html>
