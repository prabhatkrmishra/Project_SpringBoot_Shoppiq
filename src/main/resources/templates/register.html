<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Create Account')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container container-narrow auth-card">
            <div class="page-header text-center">
                <h1>Create Your Account</h1>
                <p id="page-subtitle">Join Shoppiq and start shopping today</p>
            </div>

            <div th:if="${param.error}" class="guest-banner" role="alert">
                <p th:text="${param.error}">Registration error</p>
            </div>

            <div class="panel">
                <form id="registerForm" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" id="name" name="name" class="form-input" placeholder="John Doe" required
                                   autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                                   required autocomplete="email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-input" placeholder="johndoe"
                               required autocomplete="username"
                               pattern="^[a-zA-Z0-9_]+$" minlength="3" maxlength="30">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-input"
                                   placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                                   placeholder="Repeat password" required autocomplete="new-password">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-checkbox" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 0;">
                            <input type="checkbox" id="sellerToggle" style="width:18px;height:18px;accent-color:var(--color-primary);">
                            <span class="text-sm" style="font-weight:500;">I want to sell on Shoppiq</span>
                        </label>
                        <p class="text-xs text-muted" style="margin-top:-8px;margin-bottom:12px;">Register as a seller to list and sell your products. Your account will be reviewed by an admin before activation.</p>
                    </div>

                    <div id="sellerFields" style="display:none;">
                        <div style="border-top:1px solid var(--color-border,#333);margin:4px 0 16px;padding-top:16px;">
                            <p class="text-sm fw-600 mb-md" style="color:var(--color-primary,#3b82f6);">Business Details</p>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="businessName" class="form-label">Business Name</label>
                                <input type="text" id="businessName" name="businessName" class="form-input" placeholder="Acme Pvt Ltd">
                            </div>
                            <div class="form-group">
                                <label for="businessEmail" class="form-label">Business Email</label>
                                <input type="email" id="businessEmail" name="businessEmail" class="form-input" placeholder="business@example.com">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="tel" id="phone" name="phone" class="form-input" placeholder="9876543210" maxlength="15">
                            </div>
                            <div class="form-group">
                                <label for="panNumber" class="form-label">PAN Number</label>
                                <input type="text" id="panNumber" name="panNumber" class="form-input" placeholder="ABCDE1234F" maxlength="10" style="text-transform:uppercase;">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="gstNumber" class="form-label">GST Number <span class="text-muted">(optional)</span></label>
                            <input type="text" id="gstNumber" name="gstNumber" class="form-input" placeholder="22AAAAA0000A1Z5" maxlength="20" style="text-transform:uppercase;">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create Account</button>
                </form>

                <div class="text-center mt-lg">
                    <p class="text-sm">Already have an account? <a th:href="@{/login}" class="btn-link">Sign in</a></p>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>

    <script th:inline="javascript">
        /*<![CDATA[*/
        var sellerToggle = document.getElementById("sellerToggle");
        var sellerFields = document.getElementById("sellerFields");
        var pageSubtitle = document.getElementById("page-subtitle");
        var submitBtn = document.getElementById("submit-btn");

        sellerToggle.addEventListener("change", function () {
            if (this.checked) {
                sellerFields.style.display = "";
                pageSubtitle.textContent = "Register as a seller and start selling on Shoppiq";
                submitBtn.textContent = "Create Seller Account";
            } else {
                sellerFields.style.display = "none";
                pageSubtitle.textContent = "Join Shoppiq and start shopping today";
                submitBtn.textContent = "Create Account";
            }
        });

        if (new URLSearchParams(window.location.search).get("seller") === "true") {
            sellerToggle.checked = true;
            sellerToggle.dispatchEvent(new Event("change"));
        }

        function isSellerMode() {
            return sellerToggle.checked;
        }

        function validateSellerFields() {
            var fields = [
                { id: "businessName", label: "Business Name" },
                { id: "businessEmail", label: "Business Email" },
                { id: "phone", label: "Phone" },
                { id: "panNumber", label: "PAN Number" }
            ];
            for (var i = 0; i < fields.length; i++) {
                var val = document.getElementById(fields[i].id).value.trim();
                if (!val) {
                    showToast(fields[i].label + " is required for seller registration", "error");
                    return false;
                }
            }
            var pan = document.getElementById("panNumber").value.trim();
            if (pan.length !== 10) {
                showToast("PAN Number must be exactly 10 characters", "error");
                return false;
            }
            return true;
        }

        const registerForm = document.getElementById("registerForm");
        registerForm.addEventListener("submit", async function (event) {
            event.preventDefault();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            if (password !== confirmPassword) {
                showToast("Passwords do not match", "error");
                return;
            }
            if (password.length < 8) {
                showToast("Password must be at least 8 characters", "error");
                return;
            }

            if (isSellerMode() && !validateSellerFields()) {
                return;
            }

            var userData = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                username: document.getElementById("username").value,
                password: password
            };

            if (isSellerMode()) {
                userData.businessName = document.getElementById("businessName").value.trim();
                userData.businessEmail = document.getElementById("businessEmail").value.trim();
                userData.phone = document.getElementById("phone").value.trim();
                userData.panNumber = document.getElementById("panNumber").value.trim();
                var gst = document.getElementById("gstNumber").value.trim();
                if (gst) userData.gstNumber = gst;
            }

            setButtonLoading(submitBtn, true);
            try {
                const response = await fetch("/user/register", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(userData)
                });
                if (response.ok) {
                    var msg = isSellerMode()
                        ? "Seller account created! You can now sign in. Your seller application will be reviewed by an admin."
                        : "Account created! Redirecting to login...";
                    showToast(msg, "success");
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 2000);
                } else {
                    const data = await response.json().catch(() => ({}));
                    showToast(data.detail || "Registration failed. Please try again.", "error");
                    setButtonLoading(submitBtn, false);
                }
            } catch (err) {
                showToast("Network error. Please try again.", "error");
                setButtonLoading(submitBtn, false);
            }
        });
        /*]]>*/
    </script>
</body>
</html>
