<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Seller Inventory')}"></head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="seller-main">
  <div class="seller-header">
    <div>
      <h1>Inventory</h1>
      <p>Manage your product stock levels</p>
    </div>
    <a href="/seller-panel/products" class="btn btn-primary">+ Add Product</a>
  </div>

  <div class="seller-summary-grid">
    <div class="summary-card"><div class="label">Total</div><div class="value" id="stat-total">0</div></div>
    <div class="summary-card"><div class="label">In Stock</div><div class="value success" id="stat-in-stock">0</div></div>
    <div class="summary-card"><div class="label">Low Stock</div><div class="value warning" id="stat-low-stock">0</div></div>
    <div class="summary-card"><div class="label">Out of Stock</div><div class="value danger" id="stat-out-of-stock">0</div></div>
  </div>

  <div class="admin-panel">
    <div class="admin-panel-header">
      <div class="admin-panel-title">Your Products</div>
      <div class="flex gap-sm">
        <select id="stock-filter" class="form-input" style="width:auto;">
          <option value="all">All Stock</option>
          <option value="low">Low Stock</option>
          <option value="out">Out of Stock</option>
        </select>
      </div>
    </div>
    <div class="table-responsive">
      <table class="seller-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventory-body">
          <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script>
(function () {
  'use strict';
  var allItems = [];

  function stockBadge(status) {
    if (status === 'IN_STOCK') return '<span class="status-badge in-stock">In Stock</span>';
    if (status === 'LOW_STOCK') return '<span class="status-badge low-stock">Low Stock</span>';
    return '<span class="status-badge out-of-stock">Out of Stock</span>';
  }

  function renderInventory(items) {
    allItems = items || [];
    var total = allItems.length;
    var inStock = allItems.filter(function (i) { return i.stockStatus === 'IN_STOCK'; }).length;
    var lowStock = allItems.filter(function (i) { return i.stockStatus === 'LOW_STOCK'; }).length;
    var outOfStock = allItems.filter(function (i) { return i.stockStatus === 'OUT_OF_STOCK'; }).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-in-stock').textContent = inStock;
    document.getElementById('stat-low-stock').textContent = lowStock;
    document.getElementById('stat-out-of-stock').textContent = outOfStock;

    var filter = document.getElementById('stock-filter').value;
    var filtered = allItems;
    if (filter === 'low') filtered = allItems.filter(function (i) { return i.stockStatus === 'LOW_STOCK'; });
    else if (filter === 'out') filtered = allItems.filter(function (i) { return i.stockStatus === 'OUT_OF_STOCK'; });

    var tbody = document.getElementById('inventory-body');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No products found</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    filtered.forEach(function (item) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><a href="/item/' + item.itemId + '" class="btn-link">' + (item.itemName || '') + '</a></td>' +
        '<td>' + formatCurrency(item.basePrice) + '</td>' +
        '<td>' +
          '<div class="inline-edit">' +
            '<input type="number" class="stock-input" value="' + item.stockQuantity + '" min="0" data-item-id="' + item.itemId + '">' +
            '<button class="stock-adjust-btn btn btn-sm btn-primary" data-item-id="' + item.itemId + '">Save</button>' +
          '</div>' +
        '</td>' +
        '<td>' + stockBadge(item.stockStatus) + '</td>' +
        '<td class="admin-table-actions">' +
          '<a href="/item/' + item.itemId + '" class="btn btn-sm btn-secondary">Edit</a>' +
        '</td>';
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('.stock-adjust-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var itemId = this.dataset.itemId;
        var input = tbody.querySelector('.stock-input[data-item-id="' + itemId + '"]');
        var newQty = parseInt(input.value) || 0;
        API.put('/seller/inventory/' + itemId + '/adjust?quantity=' + newQty + '&reason=Stock adjustment').then(function () {
          showToast('Stock updated', 'success');
          loadInventory();
        }).catch(function (e) { showToast(e.message, 'error'); });
      });
    });
  }

  function loadInventory() {
    API.get('/seller/inventory').then(renderInventory).catch(function () {
      document.getElementById('inventory-body').innerHTML =
        '<tr><td colspan="5" class="text-center text-muted">Failed to load inventory</td></tr>';
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    loadInventory();
    document.getElementById('stock-filter').addEventListener('change', function () {
      renderInventory(allItems);
    });
  });
})();
</script>
</body>
</html>
