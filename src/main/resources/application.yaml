spring:
  application:
    name: shoppiq
  profiles:
    active: dev
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # update -> validate
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000
  short-expiration: 1800000
  refresh-max-age: 2592000000

app:
  pagination:
    default-page-size: 20
    max-page-size: 100
    admin-page-size: 20
    seller-page-size: 15
    catalog-page-size: 12
  cors:
    allowed-methods: GET, POST, PUT, DELETE, PATCH, OPTIONS
    allowed-headers: Authorization, Content-Type, X-Requested-With, Accept, Origin, Cache-Control, X-Request-Id
    exposed-headers: X-Request-Id
    allow-credentials: true
    max-age: 3600
  rate-limit:
    enabled: true
    rules:
      # Unauthenticated : IP-based
      - path: /auth/login
        limit: 10
        duration: 900
        key-type: IP
      - path: /user/register
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/forgot-password
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/reset-password
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/verify-email
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/confirm-email
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/refresh
        limit: 10
        duration: 900
        key-type: IP
      - path: /auth/google/complete-profile
        limit: 10
        duration: 3600
        key-type: IP
      - path: /contact
        limit: 10
        duration: 3600
        key-type: IP
      - path: /api/newsletter/subscribe
        limit: 10
        duration: 3600
        key-type: IP
      # Authenticated critical : userId:IP-based
      - path: /user/order/checkout
        limit: 10
        duration: 60
        key-type: USER_IP
      - path: /user/payment/pay/*
        limit: 10
        duration: 60
        key-type: USER_IP
      - path: /user/payment/verify
        limit: 10
        duration: 60
        key-type: USER_IP
      - path: /user/password
        limit: 10
        duration: 60
        key-type: USER_IP

server:
  port: 8090

# ============================================================
# Payment & email gateway integrations
# ============================================================
shoppiq:
  email:
    from: ${EMAIL_FROM:noreply@shoppiq.com}
    enabled: ${EMAIL_ENABLED:true}
    smtp:
      host: ${SMTP_HOST:smtp.gmail.com}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME}
      password: ${SMTP_PASSWORD}
      protocol: smtp
      auth: true
      starttls:
        enable: true
  payment:
    gateways:
      razorpay:
        base-url: https://api.razorpay.com/v1
        api-key: ${RAZORPAY_KEY_ID:rzp_test_dummy}               # Production recommendation: use live key
        api-secret: ${RAZORPAY_KEY_SECRET:rzp_test_secret}       # Production recommendation: use live secret
        enabled: true
      stripe:
        base-url: https://api.stripe.com/v1
        api-key: ${STRIPE_SECRET_KEY:sk_test_dummy}              # Production recommendation: use live key
        enabled: true
      paypal:
        base-url: https://api-m.sandbox.paypal.com               # Production recommendation: https://api-m.paypal.com
        api-key: ${PAYPAL_CLIENT_ID:paypal_client_dummy}         # Production recommendation: use live client ID
        api-secret: ${PAYPAL_CLIENT_SECRET:paypal_secret_dummy}  # Production recommendation: use live secret
        enabled: true
      upi:
        base-url: ${UPI_BASE_URL:https://upi.psp.example/v1}
        api-key: ${UPI_MERCHANT_KEY:upi_merchant_dummy}
        merchant-vpa: ${UPI_MERCHANT_VPA:shoppiq@bank}
        enabled: false
  ai:
    enabled: ${AI_SERVICE_ENABLED:false}
    resolve-threshold: 3                 # Messages of closing intent before auto-resolve
    rag:
      max-results: 5                     # Top-k product chunks injected per query
      min-score: 0.75                    # Cosine similarity threshold for retrieval
      reindex-on-startup: false          # Full catalog reindex on boot (events handle the rest)

# ============================================================
# LangChain4j — AI model configuration (NVIDIA NIM / OpenAI-compatible)
# Only loaded when the AI_SERVICE_ENABLED is true.
# ============================================================
langchain4j:
  open-ai:
    chat-model:
      api-key: ${AI_NVIDIA_API_KEY}
      base-url: https://integrate.api.nvidia.com/v1
      model-name: nvidia/llama-3.3-nemotron-super-49b-v1.5
      max-tokens: 4096
      log-requests: true
      log-responses: true
    streaming-chat-model:
      api-key: ${AI_NVIDIA_API_KEY}
      base-url: https://integrate.api.nvidia.com/v1
      model-name: nvidia/llama-3.3-nemotron-super-49b-v1.5
      max-tokens: 4096
      log-requests: true
      log-responses: true
  # Qdrant vector store - docker-compose service
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6334}
    collection-name: ${QDRANT_COLLECTION:shoppiq_products}