spring:
  datasource:
    url: jdbc:h2:mem:shoppiqtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXMtb25seS10b2tlbg==
  expiration: 3600000
  short-expiration: 1800000

app:
  security:
    secure-cookie: false
  rate-limit:
    enabled: false

server:
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      internal-proxies: ".*"

shoppiq:
  ai:
    enabled: false
  email:
    provider: console
    from: test@shoppiq.com
    enabled: true

AI_NVIDIA_API_KEY: test-dummy-key-for-startup