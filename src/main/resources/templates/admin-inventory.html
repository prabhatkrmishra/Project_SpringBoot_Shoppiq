<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Shoppiq Admin</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
        .header { background: #111; color: #fff; padding: 0 40px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
        .header-nav { display: flex; gap: 20px; align-items: center; }
        .header-nav a { color: #ccc; text-decoration: none; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.15s; }
        .header-nav a:hover, .header-nav a.active { color: #fff; }
        .main { max-width: 1280px; margin: 0 auto; padding: 40px; }
        .section-label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid #e0e0e0; }
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
        .summary-card { background: #fff; border: 1px solid #e0e0e0; padding: 24px; }
        .summary-card .label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 8px; }
        .summary-card .value { font-size: 1.8rem; font-weight: 600; color: #111; }
        .summary-card .value.warning { color: #c44; }
        .panel { background: #fff; border: 1px solid #e0e0e0; padding: 24px; margin-bottom: 20px; }
        .panel-title { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .filter-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #ddd; font-size: 0.85rem; background: #fff; }
        .filter-bar button { padding: 8px 16px; background: #111; color: #fff; border: none; cursor: pointer; font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase; }
        .filter-bar button:hover { background: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #e0e0e0; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        tr:hover { background: #fafafa; }
        .stock-input { width: 80px; padding: 6px 8px; border: 1px solid #ddd; text-align: center; }
        .adjust-btn { padding: 4px 12px; background: #2d7d46; color: #fff; border: none; cursor: pointer; font-size: 0.75rem; }
        .adjust-btn:hover { background: #245c36; }
        .bulk-btn { padding: 8px 20px; background: #2a6496; color: #fff; border: none; cursor: pointer; font-size: 0.8rem; }
        .bulk-btn:hover { background: #1e4d73; }
        .status-badge { display: inline-block; padding: 3px 10px; font-size: 0.7rem; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 2px; }
        .status-badge.in-stock { background: #d4edda; color: #155724; }
        .status-badge.low-stock { background: #fff3cd; color: #856404; }
        .status-badge.out-of-stock { background: #f8d7da; color: #721c24; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; background: #2d7d46; color: #fff; font-size: 0.85rem; z-index: 1000; display: none; }
        .toast.error { background: #c44; }
        @media (max-width: 768px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="header">
        <h1>Shoppiq Admin</h1>
        <nav class="header-nav">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/inventory" class="active">Inventory</a>
            <a href="/admin/orders">Orders</a>
            <a href="/admin/users">Customers</a>
            <a href="/admin/payments">Payments</a>
            <a href="/admin/reviews">Reviews</a>
            <a href="/admin/reports">Reports</a>
            <a href="/allitems">Store</a>
        </nav>
    </header>

    <main class="main">
        <div class="section-label">Inventory Management</div>

        <div class="summary-grid">
            <div class="summary-card">
                <div class="label">Total Products</div>
                <div class="value" id="totalProducts">-</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Stock Units</div>
                <div class="value" id="totalStock">-</div>
            </div>
            <div class="summary-card">
                <div class="label">Low Stock</div>
                <div class="value warning" id="lowStock">-</div>
            </div>
            <div class="summary-card">
                <div class="label">Out of Stock</div>
                <div class="value warning" id="outOfStock">-</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span>Product Inventory</span>
                <button class="bulk-btn" onclick="bulkUpdate()">Bulk Update</button>
            </div>
            <div class="filter-bar">
                <select id="statusFilter" onchange="loadInventory()">
                    <option value="">All Status</option>
                    <option value="IN_STOCK">In Stock</option>
                    <option value="LOW_STOCK">Low Stock</option>
                    <option value="OUT_OF_STOCK">Out of Stock</option>
                </select>
                <input type="text" id="searchInput" placeholder="Search by name or SKU..." oninput="filterTable()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>SKU</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th>Adjust</th>
                    </tr>
                </thead>
                <tbody id="inventoryTable">
                    <tr><td colspan="7" style="text-align:center;padding:40px;color:#888">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const API = '/api/admin/inventory';
        let allItems = [];

        async function fetchJSON(url) {
            const res = await fetch(url, { credentials: 'include' });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return res.json();
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = isError ? 'toast error' : 'toast';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function formatCurrency(val) {
            return '₹' + Number(val).toLocaleString('en-IN', { minimumFractionDigits: 2 });
        }

        function renderTable(items) {
            const tbody = document.getElementById('inventoryTable');
            if (!items || items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#888">No products found</td></tr>';
                return;
            }
            tbody.innerHTML = items.map(item => `
                <tr data-status="${item.stockStatus}">
                    <td><strong>${item.itemName}</strong><br><span style="color:#888;font-size:0.75rem">${item.brand}</span></td>
                    <td>${item.sku}</td>
                    <td>${item.categoryName}</td>
                    <td>${formatCurrency(item.effectivePrice)}</td>
                    <td><input type="number" class="stock-input" id="stock-${item.itemId}" value="${item.stockQuantity}" min="0"></td>
                    <td><span class="status-badge ${item.stockStatus.toLowerCase().replace('_', '-')}">${item.stockStatus.replace('_', ' ')}</span></td>
                    <td><button class="adjust-btn" onclick="adjustStock(${item.itemId})">Update</button></td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allItems.filter(item =>
                item.itemName.toLowerCase().includes(search) ||
                item.sku.toLowerCase().includes(search)
            );
            renderTable(filtered);
        }

        async function loadSummary() {
            try {
                const summary = await fetchJSON(`${API}/summary`);
                document.getElementById('totalProducts').textContent = summary.totalProducts;
                document.getElementById('totalStock').textContent = summary.totalStockUnits.toLocaleString();
                document.getElementById('lowStock').textContent = summary.lowStockProducts;
                document.getElementById('outOfStock').textContent = summary.outOfStockProducts;
            } catch (err) {
                console.error('Failed to load summary:', err);
            }
        }

        async function loadInventory() {
            try {
                allItems = await fetchJSON(API);
                renderTable(allItems);
            } catch (err) {
                console.error('Failed to load inventory:', err);
            }
        }

        async function adjustStock(itemId) {
            const input = document.getElementById(`stock-${itemId}`);
            const item = allItems.find(i => i.itemId === itemId);
            const diff = parseInt(input.value) - item.stockQuantity;

            try {
                await fetch(`${API}/${itemId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ quantity: Math.abs(diff), reason: 'Manual adjustment' })
                });
                showToast('Stock updated successfully');
                await Promise.all([loadSummary(), loadInventory()]);
            } catch (err) {
                showToast('Failed to update stock', true);
            }
        }

        async function bulkUpdate() {
            showToast('Bulk update: Select items and adjust quantities');
        }

        async function init() {
            await Promise.all([loadSummary(), loadInventory()]);
        }

        init();
    </script>
</body>
</html>
