<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Shop')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container">
            <div class="page-header">
                <h1>All Products</h1>
                <p id="itemCount"></p>
            </div>

            <div class="flex flex-col gap-md" style="margin-bottom:24px;">
                <form class="form-inline" id="filterForm" onsubmit="return false;">
                    <div class="form-group" style="flex:2;">
                        <label for="search" class="sr-only">Search products</label>
                        <input type="search" id="search" class="form-input" placeholder="Search products..."
                               autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="categoryFilter" class="sr-only">Category</label>
                        <select id="categoryFilter" class="form-select">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="loadItems(0)">Search</button>
                </form>
            </div>

            <div id="emptyState" class="cart-empty" style="display:none;">
                <h2>No products found</h2>
                <p>Try adjusting your search or filter criteria.</p>
                <button class="btn btn-primary" onclick="resetFilters()">Clear Filters</button>
            </div>

            <div id="loadingState" class="text-center" style="padding:48px 0;">
                <div class="spinner"></div>
                <p class="text-muted mt-md">Loading products...</p>
            </div>

            <div id="itemGrid" class="grid-4" style="display:none;"></div>
            <div id="items-pagination"></div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-js}"></th:block>

    <script th:src="@{/js/pagination.js}"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var currentPage = 0;
        var PAGE_SIZE = 12;

        document.addEventListener("DOMContentLoaded", function () {
            loadCategories();
            loadItems(0);
            document.getElementById("search").addEventListener("keyup", debounce(function () {
                loadItems(0);
            }, 300));
            document.getElementById("categoryFilter").addEventListener("change", function () {
                loadItems(0);
            });
        });

        async function loadCategories() {
            try {
                var cats = await API.get("/categories/all");
                var sel = document.getElementById("categoryFilter");
                cats.forEach(function (c) {
                    var opt = document.createElement("option");
                    opt.value = c.id;
                    opt.textContent = c.name;
                    sel.appendChild(opt);
                });
            } catch (e) { /* silent */
            }
        }

        async function loadItems(page) {
            if (page != null) currentPage = page;
            var grid = document.getElementById("itemGrid");
            var empty = document.getElementById("emptyState");
            var loading = document.getElementById("loadingState");
            loading.style.display = "";
            grid.style.display = "none";
            empty.style.display = "none";

            try {
                var search = document.getElementById("search").value.toLowerCase();
                var catId = document.getElementById("categoryFilter").value;

                var url = "/items/all?page=" + currentPage + "&size=" + PAGE_SIZE;
                var data = await API.get(url);
                var items = data && data.content ? data.content : (Array.isArray(data) ? data : []);

                var filtered = items.filter(function (item) {
                    var matchSearch = !search || item.name.toLowerCase().indexOf(search) !== -1 ||
                        (item.description && item.description.toLowerCase().indexOf(search) !== -1);
                    var matchCat = !catId || (item.category && String(item.category.id) === catId);
                    return matchSearch && matchCat;
                });

                document.getElementById("itemCount").textContent = (data.totalElements || filtered.length) + " products available";

                if (filtered.length === 0) {
                    empty.style.display = "";
                    grid.style.display = "none";
                } else {
                    ProductCard.renderGrid(grid, filtered, {showStock: true});
                    grid.style.display = "";
                    empty.style.display = "none";
                }

                Pagination.render("items-pagination", data, loadItems, {
                    onPageSizeChange: function (newSize) {
                        PAGE_SIZE = newSize;
                        loadItems(0);
                    }
                });
            } catch (e) {
                empty.style.display = "";
                empty.querySelector("h2").textContent = "Could not load products";
                empty.querySelector("p").textContent = e.message || "Please try again later.";
            } finally {
                loading.style.display = "none";
            }
        }

        function resetFilters() {
            document.getElementById("search").value = "";
            document.getElementById("categoryFilter").value = "";
            loadItems(0);
        }

        function debounce(fn, ms) {
            var t;
            return function () {
                var ctx = this, args = arguments;
                clearTimeout(t);
                t = setTimeout(function () {
                    fn.apply(ctx, args);
                }, ms);
            };
        }

        /*]]>*/
    </script>
</body>
</html>
