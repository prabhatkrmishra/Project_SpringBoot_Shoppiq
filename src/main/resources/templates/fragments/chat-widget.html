<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <div id="ai-chat-widget" class="ai-chat-widget" aria-hidden="true" th:fragment="widget"
         th:if="${@environment.getProperty('shoppiq.ai.enabled') == 'true'}">

        <button class="ai-chat-toggle" id="ai-chat-toggle" aria-label="AI Assistant">
            <i data-lucide="bot"></i>
            <span class="ai-chat-fallback-icon" aria-hidden="true">AI</span>
        </button>

        <div class="ai-chat-panel" id="ai-chat-panel" aria-hidden="true">
            <div class="ai-chat-header">
                <div class="ai-chat-header-info">
                    <i data-lucide="bot" class="icon-sm"></i>
                    <div>
                        <h3>Shoppiq Assistant</h3>
                        <span class="ai-chat-id" id="ai-chat-id"></span>
                        <span class="ai-chat-user-id" id="ai-chat-user-id"></span>
                    </div>
                </div>
                <div class="ai-chat-header-actions">
                    <select id="ai-model-select" class="ai-model-select" aria-label="Select AI model">
                        <option value="nvidia/llama-3.3-nemotron-super-49b-v1.5">Nemotron 49B</option>
                        <option value="nvidia/nemotron-3-nano-30b-a3b">Nemotron Nano 30B</option>
                    </select>
                    <button class="ai-chat-btn-icon" id="ai-chat-history-btn" aria-label="Conversations">
                        <i data-lucide="history"></i>
                    </button>
                    <button class="ai-chat-btn-icon" id="ai-chat-close" aria-label="Close">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>

            <div class="ai-chat-sidebar" id="ai-chat-sidebar" aria-hidden="true">
                <div class="ai-chat-sidebar-header">
                    <h4>Conversations</h4>
                    <button class="ai-chat-btn-icon" id="ai-chat-new" aria-label="New conversation">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
                <div class="ai-chat-sidebar-list" id="ai-chat-sidebar-list"></div>
            </div>

            <div class="ai-chat-messages" id="ai-chat-messages">
                <div class="ai-chat-welcome">
                    <p>Hi! I'm Shoppiq's AI assistant.</p>
                    <p>I can help you find products, check orders, and more.</p>
                </div>
            </div>

            <div class="ai-chat-resolved-banner" id="ai-chat-resolved-banner" aria-hidden="true">
                <p>This conversation has been resolved.</p>
                <button class="btn btn-sm btn-primary" id="ai-chat-new-after-resolve">Start New Conversation</button>
            </div>

            <div class="ai-chat-input-area" id="ai-chat-input-area">
                <div class="ai-chat-input-row">
                <textarea id="ai-chat-input"
                          placeholder="Ask me anything..."
                          rows="1"
                          maxlength="2000"></textarea>
                    <button id="ai-chat-send" aria-label="Send message">
                        <i data-lucide="send"></i>
                    </button>
                </div>
                <div class="ai-chat-input-footer">
                    <button class="ai-chat-resolve-btn" id="ai-chat-resolve-btn">
                        <i data-lucide="check-circle"></i> Mark as Resolved
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
