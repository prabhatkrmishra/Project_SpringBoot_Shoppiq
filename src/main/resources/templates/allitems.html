<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Shop')}"></head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="page">
  <div class="container">
    <div class="page-header">
      <h1>All Products</h1>
      <p id="itemCount"></p>
    </div>

    <div class="flex flex-col gap-md" style="margin-bottom:24px;">
      <form class="form-inline" id="filterForm" onsubmit="return false;">
        <div class="form-group" style="flex:2;">
          <label for="search" class="sr-only">Search products</label>
          <input type="search" id="search" class="form-input" placeholder="Search products..." autocomplete="off">
        </div>
        <div class="form-group">
          <label for="categoryFilter" class="sr-only">Category</label>
          <select id="categoryFilter" class="form-select">
            <option value="">All Categories</option>
          </select>
        </div>
        <button type="button" class="btn btn-primary" onclick="loadItems()">Search</button>
      </form>
    </div>

    <div id="emptyState" class="cart-empty" style="display:none;">
      <h2>No products found</h2>
      <p>Try adjusting your search or filter criteria.</p>
      <button class="btn btn-primary" onclick="resetFilters()">Clear Filters</button>
    </div>

    <div id="loadingState" class="text-center" style="padding:48px 0;">
      <div class="spinner"></div>
      <p class="text-muted mt-md">Loading products...</p>
    </div>

    <div id="itemGrid" class="grid-4" style="display:none;"></div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-js}"></th:block>

<script th:inline="javascript">
/*<![CDATA[*/
var allItems = [];

document.addEventListener("DOMContentLoaded", function () {
  loadCategories();
  loadItems();
  document.getElementById("search").addEventListener("keyup", debounce(loadItems, 300));
  document.getElementById("categoryFilter").addEventListener("change", loadItems);
});

async function loadCategories() {
  try {
    var cats = await API.get("/categories/all");
    var sel = document.getElementById("categoryFilter");
    cats.forEach(function (c) {
      var opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch (e) { /* silent */ }
}

async function loadItems() {
  var grid = document.getElementById("itemGrid");
  var empty = document.getElementById("emptyState");
  var loading = document.getElementById("loadingState");
  loading.style.display = "";
  grid.style.display = "none";
  empty.style.display = "none";

  try {
    allItems = await API.get("/items/all");
    var search = document.getElementById("search").value.toLowerCase();
    var catId = document.getElementById("categoryFilter").value;

    var filtered = allItems.filter(function (item) {
      var matchSearch = !search || item.name.toLowerCase().indexOf(search) !== -1 || (item.description && item.description.toLowerCase().indexOf(search) !== -1);
      var matchCat = !catId || (item.category && String(item.category.id) === catId);
      return matchSearch && matchCat;
    });

    document.getElementById("itemCount").textContent = filtered.length + " products available";

    if (filtered.length === 0) {
      empty.style.display = "";
      grid.style.display = "none";
    } else {
      grid.innerHTML = filtered.map(renderItemCard).join("");
      grid.style.display = "";
      empty.style.display = "none";
    }
  } catch (e) {
    empty.style.display = "";
    empty.querySelector("h2").textContent = "Could not load products";
    empty.querySelector("p").textContent = e.message || "Please try again later.";
  } finally {
    loading.style.display = "none";
  }
  if (typeof lucide !== "undefined") lucide.createIcons();
}

function renderItemCard(item) {
  var imgUrl = item.imageUrl || "https://plus.unsplash.com/premium_photo-1683746792239-6ce8cdd3ac78?q=80&w=687&fit=crop";
  var hasDiscount = item.discountPercentage && parseFloat(item.discountPercentage) > 0;
  var stockClass = item.stockQuantity > 10 ? "badge-success" : (item.stockQuantity > 0 ? "badge-warning" : "badge-danger");
  var stockText = item.stockQuantity > 0 ? "In Stock" : "Out of Stock";
  return '<a href="/item/' + item.slug + '" class="card-link">' +
    '<article class="card product-card">' +
      '<div class="card-image-wrapper">' +
        '<img class="card-image" src="' + escapeAttr(imgUrl) + '" alt="' + escapeAttr(item.name) + '" loading="lazy" width="300" height="300">' +
        (hasDiscount ? '<span class="card-badge badge badge-success">Sale</span>' : '') +
      '</div>' +
      '<div class="card-body">' +
        '<h3 class="card-title">' + escapeHtml(item.name) + '</h3>' +
        '<p class="card-text">' + escapeHtml(item.description || '') + '</p>' +
        '<div class="card-price">' +
          '<span>$' + escapeHtml(String(item.price)) + '</span>' +
        '</div>' +
        '<div class="card-meta"><span class="badge ' + stockClass + '">' + stockText + '</span></div>' +
      '</div>' +
    '</article>' +
  '</a>';
}

function resetFilters() {
  document.getElementById("search").value = "";
  document.getElementById("categoryFilter").value = "";
  loadItems();
}

function escapeHtml(str) { var d = document.createElement("div"); d.appendChild(document.createTextNode(str)); return d.innerHTML; }
function escapeAttr(str) { return str.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function debounce(fn, ms) { var t; return function () { var ctx = this, args = arguments; clearTimeout(t); t = setTimeout(function () { fn.apply(ctx, args); }, ms); }; }
/*]]>*/
</script>
</body>
</html>
