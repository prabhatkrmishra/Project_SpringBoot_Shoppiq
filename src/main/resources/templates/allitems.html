<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Catalog</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 40px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            color: #111;
        }

        .logout-btn {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #555;
            background: none;
            border: 1px solid #ccc;
            padding: 6px 16px;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .logout-btn:hover {
            border-color: #111;
            color: #111;
        }

        /* Main layout */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 40px;
        }

        .section-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        /* Grid */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        /* Card */
        .item-card {
            background: #fff;
            display: flex;
            flex-direction: column;
            border: 1px solid #e0e0e0;
        }

        .card-top {
            padding: 24px 24px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .item-meta {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 8px;
        }

        .item-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #111;
            line-height: 1.35;
            margin-bottom: 10px;
            font-family: 'Segoe UI', sans-serif;
        }

        .item-description {
            font-size: 0.875rem;
            color: #555;
            line-height: 1.65;
            padding-bottom: 18px;
        }

        /* Details table */
        .card-details {
            padding: 18px 24px;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 5px 0;
        }

        .detail-row + .detail-row {
            border-top: 1px solid #f5f5f5;
        }

        .detail-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #999;
        }

        .detail-value {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            color: #333;
            font-weight: 500;
        }

        .item-price {
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #111;
            letter-spacing: -0.02em;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #f0f0f0;
        }

        .price-label {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #aaa;
            font-weight: 400;
            display: block;
            margin-bottom: 2px;
        }

        .stock-info {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.75rem;
            color: #666;
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stock-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .stock-badge.in-stock {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .stock-badge.low-stock {
            background: #fff3e0;
            color: #e65100;
        }

        .stock-badge.out-of-stock {
            background: #fbe9e7;
            color: #c62828;
        }

        .discount-badge {
            display: inline-block;
            background: #fce4ec;
            color: #c62828;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        /* Reviews */
        .card-reviews {
            padding: 16px 24px 20px;
            background: #fafafa;
            flex: 1;
        }

        .reviews-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 12px;
        }

        .review-item {
            padding: 10px 0;
            border-bottom: 1px solid #ebebeb;
        }

        .review-item:last-child {
            border-bottom: none;
        }

        .review-text {
            font-size: 0.84rem;
            color: #444;
            line-height: 1.55;
            font-style: italic;
        }

        .review-author {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            color: #999;
            margin-top: 4px;
            letter-spacing: 0.04em;
        }

        .review-rating {
            display: inline-block;
            color: #f57c00;
            font-size: 0.8rem;
            margin-right: 6px;
        }

        .no-reviews {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            color: #bbb;
        }

        /* States */
        .loading,
        .error-message {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
            background: #fff;
        }

        .error-message {
            color: #c0392b;
        }

        .error-message a {
            color: #111;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header {
                padding: 0 16px;
            }

            .main {
                padding: 20px 16px;
            }

            .items-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Product Catalog</h1>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </header>

    <main class="main">
        <div class="section-label">All Items</div>
        <div id="itemsContainer" class="items-grid">
            <div class="loading">Loading items...</div>
        </div>
    </main>

    <script>
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
            });
        }

        function getStockBadge(stock) {
            if (stock === undefined || stock === null) return '';
            if (stock <= 0) return '<span class="stock-badge out-of-stock">Out of Stock</span>';
            if (stock <= 10) return '<span class="stock-badge low-stock">Low Stock</span>';
            return '<span class="stock-badge in-stock">In Stock</span>';
        }

        function renderStars(rating) {
            if (!rating) return '';
            const full = '★'.repeat(Math.floor(rating));
            const empty = '☆'.repeat(5 - Math.floor(rating));
            return full + empty;
        }

        async function loadItems() {
            try {
                const res = await fetch("/items/all", {
                    credentials: "include"
                });

                if (res.status === 401 || res.status === 403) {
                    window.location.href = "/login";
                    return;
                }

                if (!res.ok) throw new Error();

                const items = await res.json();
                const container = document.getElementById("itemsContainer");

                if (!items.length) {
                    container.innerHTML = '<div class="error-message">No items found.</div>';
                    return;
                }

                container.innerHTML = items.map(item => {
                    const reviews = item.itemReviews || [];
                    const reviewCount = reviews.length;

                    const reviewsHtml = reviewCount
                        ? reviews.map(r => `
                            <div class="review-item">
                                <div class="review-text">
                                    <span class="review-rating">${renderStars(r.rating)}</span>
                                    ${escapeHtml(r.review)}
                                </div>
                                <div class="review-author">${escapeHtml(r.username || 'Anonymous')}</div>
                            </div>`).join('')
                        : '<div class="no-reviews">No reviews yet.</div>';

                    const categoryName = item.category?.name || 'Uncategorized';
                    const brand = item.brand || 'N/A';
                    const price = item.price || 0;
                    const stock = item.stockQuantity || 0;
                    const discount = item.discountPercentage || 0;
                    const discountedPrice = discount > 0 ? price * (1 - discount / 100) : null;

                    return `
                    <div class="item-card">
                        <div class="card-top">
                            <div class="item-meta">ID: ${item.id}</div>
                            <div class="item-name">${escapeHtml(item.name)}</div>
                            <div class="item-description">${escapeHtml(item.description)}</div>
                        </div>

                        <div class="card-details">
                            <div class="detail-row">
                                <span class="detail-label">Brand</span>
                                <span class="detail-value">${escapeHtml(brand)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Category</span>
                                <span class="detail-value">${escapeHtml(categoryName)}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">SKU</span>
                                <span class="detail-value">${escapeHtml(item.sku || 'N/A')}</span>
                            </div>
                            <div class="item-price">
                                <span class="price-label">Price</span>
                                ${discount > 0 ? `
                                    <span style="text-decoration: line-through; color: #999; font-size: 0.9rem; font-weight: 400; margin-right: 8px;">
                                        Rs. ${price.toLocaleString('en-IN')}
                                    </span>
                                    <span style="color: #c62828; font-weight: 700;">
                                        Rs. ${discountedPrice.toLocaleString('en-IN')}
                                    </span>
                                    <span class="discount-badge" style="margin-left: 8px;">${discount}% OFF</span>
                                ` : `
                                    Rs. ${price.toLocaleString('en-IN')}
                                `}
                            </div>
                            <div class="stock-info">
                                <span>Stock: ${stock}</span>
                                ${getStockBadge(stock)}
                            </div>
                        </div>

                        <div class="card-reviews">
                            <div class="reviews-label">Reviews (${reviewCount})</div>
                            ${reviewsHtml}
                        </div>
                    </div>`;
                }).join('');

            } catch (err) {
                document.getElementById("itemsContainer").innerHTML =
                    '<div class="error-message">Failed to load items. <a href="/login">Login again</a></div>';
            }
        }

        document.getElementById("logoutBtn").onclick = async function () {
            await fetch("/auth/logout", {
                method: "POST",
                credentials: "include"
            }).catch(() => {
            });

            window.location.href = "/login";
        };

        loadItems();
    </script>

</body>
</html>
