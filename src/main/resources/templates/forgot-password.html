<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Forgot Password')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container container-narrow auth-card">
            <div class="auth-brand">
                <div class="auth-brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 01-8 0"/>
                    </svg>
                </div>
            </div>

            <div class="page-header text-center">
                <h1>Forgot Password</h1>
                <p>Enter your email address and we'll send you a code to reset your password</p>
            </div>

            <div class="panel">
                <div id="request-step">
                    <form id="forgotPasswordForm" novalidate>
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input"
                                   placeholder="Enter your email address" required autocomplete="email">
                            <span class="form-error" id="email-error"></span>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block" id="send-code-btn">Send Reset Code</button>
                    </form>
                </div>

                <div id="success-step" class="hidden">
                    <div class="text-center">
                        <div class="success-icon mb-md">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-primary)">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                <polyline points="22 4 12 14.01 9 11.01"></polyline>
                            </svg>
                        </div>
                        <h3 class="mb-sm">Check Your Email</h3>
                        <p class="text-muted mb-lg" id="success-message">If an account exists with that email, a password reset code has been sent.</p>
                        <a th:href="@{/reset-password}" class="btn btn-primary btn-block">Enter Reset Code</a>
                        <p class="text-sm mt-md">Didn't receive the code? <button type="button" class="btn-link" id="resend-btn">Resend</button></p>
                        <p class="text-sm mt-sm"><a th:href="@{/login}" class="btn-link">Back to Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>

    <script th:inline="javascript">
        /*<![CDATA[*/
        (() => {
            const form = document.getElementById('forgotPasswordForm');
            const emailInput = document.getElementById('email');
            const requestStep = document.getElementById('request-step');
            const successStep = document.getElementById('success-step');
            const resendBtn = document.getElementById('resend-btn');
            let currentEmail = '';

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                if (!email) {
                    document.getElementById('email-error').textContent = 'Email is required';
                    return;
                }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    document.getElementById('email-error').textContent = 'Please enter a valid email';
                    return;
                }
                currentEmail = email;
                await sendResetCode(email);
            });

            resendBtn.addEventListener('click', async () => {
                if (currentEmail) await sendResetCode(currentEmail);
            });

            async function sendResetCode(email) {
                const btn = document.getElementById('send-code-btn');
                btn.disabled = true;
                btn.textContent = 'Sending...';
                try {
                    const response = await fetch('/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ email })
                    });
                    if (response.ok) {
                        localStorage.setItem('resetEmail', email);
                        requestStep.classList.add('hidden');
                        successStep.classList.remove('hidden');
                    } else {
                        const data = await response.json().catch(() => ({}));
                        showToast(data.detail || 'Something went wrong. Please try again.', 'error');
                    }
                } catch (err) {
                    showToast('Unable to connect to server', 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Send Reset Code';
                }
            }
        })();
        /*]]>*/
    </script>
</body>
</html>
