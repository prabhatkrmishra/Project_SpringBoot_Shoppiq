<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Sign In')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container container-narrow auth-card">
            <div class="auth-brand">
                <div class="auth-brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 01-8 0"/>
                    </svg>
                </div>
            </div>

            <div class="page-header text-center">
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue shopping</p>
            </div>

            <div th:if="${param.error}" class="guest-banner" role="alert">
                <p>Invalid username or password. Please try again.</p>
            </div>
            <div th:if="${param.logout}" class="toast toast-info" role="alert">
                <span class="toast-message">You have been signed out.</span>
            </div>

            <div class="panel">
                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" name="username" class="form-input"
                               placeholder="Enter your username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <div class="flex items-center justify-between mb-md">
                        <label class="form-checkbox">
                            <input type="checkbox" id="rememberMe">
                            <span class="text-sm">Remember me</span>
                        </label>
                        <a th:href="@{/forgot-password}" class="text-sm btn-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>

                <div class="auth-divider"><span>or</span></div>

                <button type="button" id="googleLoginBtn"
                        class="btn btn-google btn-block">
                    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                              fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                              fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                              fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                              fill="#EA4335"/>
                    </svg>
                    Sign in with Google
                </button>

                <div class="text-center mt-lg">
                    <p class="text-sm">Don't have an account? <a id="registerLink" th:href="@{/register}"
                                                                 class="btn-link">Create one</a></p>
                    <p class="text-sm mt-sm">Want to sell on Shoppiq? <a id="sellerRegisterLink"
                                                                         th:href="@{/register(seller=true)}"
                                                                         class="btn-link">Register as a seller</a></p>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>

    <script th:inline="javascript">
        /*<![CDATA[*/
        document.getElementById("loginForm").addEventListener("submit", async function (event) {
            event.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const rememberMe = document.getElementById("rememberMe").checked;
            const params = new URLSearchParams(window.location.search);
            const rawReturnUrl = params.get("returnUrl");
            const returnUrl = rawReturnUrl && rawReturnUrl.startsWith("/") && !rawReturnUrl.startsWith("//") ? rawReturnUrl : null;
            if (!username || !password) {
                showToast("Please fill in all fields", "error");
                return;
            }
            try {
                const response = await fetch("/auth/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    /* credentials: "include" ensures the browser sends/accepts cookies */
                    credentials: "include",
                    body: JSON.stringify({username: username, password: password, rememberMe: rememberMe})
                });
                if (!response.ok) {
                    const data = await response.json().catch(() => ({}));
                    showToast(data.detail || "Invalid username or password", "error");
                    return;
                }
                showToast("Login successful", "success");
                setTimeout(() => {
                    window.location.href = returnUrl || "/allitems";
                }, 800);
            } catch (err) {
                showToast("Unable to connect to server", "error");
            }
        });
        /*]]>*/
    </script>
    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var returnUrl = params.get("returnUrl");
            if (returnUrl && returnUrl.startsWith("/") && !returnUrl.startsWith("//")) {
                var rl = document.getElementById("registerLink");
                var srl = document.getElementById("sellerRegisterLink");
                if (rl) rl.href = "/register?returnUrl=" + encodeURIComponent(returnUrl);
                if (srl) srl.href = "/register?seller=true&returnUrl=" + encodeURIComponent(returnUrl);
            }

            var googleBtn = document.getElementById("googleLoginBtn");
            if (googleBtn) {
                googleBtn.addEventListener("click", function () {
                    var url = "/oauth2/authorization/google";
                    if (returnUrl && returnUrl.startsWith("/") && !returnUrl.startsWith("//")) {
                        url += "?returnUrl=" + encodeURIComponent(returnUrl);
                    }
                    window.location.href = url;
                });
            }
        })();
    </script>
</body>
</html>
