<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Update</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background-color: #f4f4f4;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4; padding: 20px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0"
                       style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #059669; padding: 30px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Shoppiq</h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px 30px;">
                            <h2 style="color: #1e293b; margin: 0 0 20px 0;" th:text="${orderTitle} ?: 'Order Update'">
                                Order Update</h2>

                            <p style="color: #475569; line-height: 1.6; margin: 0 0 20px 0;">
                                Hello <strong th:text="${userName}">User</strong>,
                            </p>

                            <p style="color: #475569; line-height: 1.6; margin: 0 0 20px 0;" th:text="${orderMessage}">
                                Your order status has been updated.
                            </p>

                            <!-- Order Details -->
                            <table width="100%" cellpadding="0" cellspacing="0"
                                   style="margin: 20px 0; background-color: #f0fdf4; border-radius: 8px; border: 1px solid #bbf7d0;">
                                <tr>
                                    <td style="padding: 20px;">
                                        <p style="color: #166534; font-size: 14px; margin: 0 0 10px 0;">
                                            <strong>Order ID:</strong> <span th:text="${orderId} ?: 'N/A'">N/A</span>
                                        </p>
                                        <p style="color: #166534; font-size: 14px; margin: 0 0 10px 0;">
                                            <strong>Status:</strong> <span
                                                th:text="${orderStatus} ?: 'Unknown'">Unknown</span>
                                        </p>
                                        <p style="color: #166534; font-size: 14px; margin: 0 0 10px 0;"
                                           th:if="${orderTotal}">
                                            <strong>Total:</strong> <span th:text="${orderTotal}">N/A</span>
                                        </p>
                                        <p style="color: #166534; font-size: 14px; margin: 0;"
                                           th:if="${isDelivered} and ${deliveryAddress}">
                                            <strong>Delivered to:</strong><br>
                                            <span th:text="${deliveryAddress}">Address</span>
                                        </p>
                                    </td>
                                </tr>
                            </table>

                            <p style="color: #475569; line-height: 1.6; margin: 20px 0 0 0;">
                                You can view your order details in your account dashboard.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8fafc; padding: 20px 30px; text-align: center; border-top: 1px solid #e2e8f0;">
                            <p style="color: #94a3b8; font-size: 12px; margin: 0;">
                                This is a transactional email from Shoppiq.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
