<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('My Orders')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container container-narrow">
            <div class="page-header">
                <h1>My Orders</h1>
                <p>View and track your orders</p>
            </div>

            <div id="orders-loading" class="flex-center" style="padding:3rem;">
                <span class="spinner"></span>
            </div>

            <div id="orders-empty" class="cart-empty" style="display:none;">
                <h2>No orders yet</h2>
                <p>Place your first order to see it here.</p>
                <a href="/allitems" class="btn btn-primary">Start Shopping</a>
            </div>

            <div id="orders-list" style="display:none;"></div>
            <div id="orders-pagination"></div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
    <script src="/js/sanitize.js"></script>
    <script th:src="@{/js/pagination.js}"></script>
    <script>
    (function () {
      'use strict';
      var currentPage = 0;
      var PAGE_SIZE = 20;

      function badgeClass(status) {
        if (status === 'DELIVERED' || status === 'COMPLETED') return 'badge-success';
        if (status === 'CANCELLED' || status === 'RETURNED' || status === 'REFUNDED' || status === 'REPLACED') return 'badge-danger';
        if (status === 'CANCEL_REQUEST' || status === 'RETURN_REQUEST' || status === 'REFUND_REQUEST' || status === 'REPLACE_REQUEST') return 'badge-info';
        if (status === 'RETURN_PICKUP' || status === 'REPLACE_PICKUP') return 'badge-info';
        return 'badge-warning';
      }

      function renderOrders(orders) {
        document.getElementById('orders-loading').style.display = 'none';
        if (!orders || orders.length === 0) {
          document.getElementById('orders-empty').style.display = '';
          document.getElementById('orders-list').style.display = 'none';
          return;
        }
        var container = document.getElementById('orders-list');
        container.style.display = '';
        container.innerHTML = '';
        orders.forEach(function (order) {
          var itemCount = order.orderItems ? order.orderItems.length : 0;
          var div = document.createElement('div');
          div.className = 'card mb-md';
          div.innerHTML =
            '<div class="card-body">' +
              '<div class="flex items-center justify-between mb-sm">' +
                '<div>' +
                  '<strong>Order #' + order.id + '</strong>' +
                  '<span class="text-muted text-sm ml-sm">' + formatDate(order.placedAt) + '</span>' +
                '</div>' +
                '<span class="badge ' + badgeClass(order.status) + '">' + escapeHtml(order.status) + '</span>' +
              '</div>' +
              '<p class="text-sm" style="margin:0;">' +
                itemCount + ' item(s)' +
                ' &middot; <strong>' + formatCurrency(order.grandTotal) + '</strong>' +
              '</p>' +
              '<div class="mt-md">' +
                '<a href="/order-detail?id=' + order.id + '" class="btn btn-sm btn-secondary">View Details</a>' +
              '</div>' +
            '</div>';
          container.appendChild(div);
        });
      }

      function loadOrders(page) {
        if (page != null) currentPage = page;
        document.getElementById('orders-loading').style.display = '';
        document.getElementById('orders-empty').style.display = 'none';
        document.getElementById('orders-list').style.display = 'none';

        API.get('/user/order/get/all?page=' + currentPage + '&size=' + PAGE_SIZE).then(function (data) {
          var orders = data && data.content ? data.content : (Array.isArray(data) ? data : []);
          renderOrders(orders);
            Pagination.render('orders-pagination', data, loadOrders, {
                onPageSizeChange: function (newSize) {
                    PAGE_SIZE = newSize;
                    loadOrders(0);
                }
            });
        }).catch(function () {
          document.getElementById('orders-loading').style.display = 'none';
          document.getElementById('orders-empty').style.display = '';
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        loadOrders(0);
      });
    })();
    </script>
</body>
</html>
