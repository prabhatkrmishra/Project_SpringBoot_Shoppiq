<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Category')}"></head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="page">
  <div class="container">
    <div id="loadingState" class="text-center" style="padding:48px 0;">
      <div class="spinner"></div>
      <p class="text-muted mt-md">Loading products...</p>
    </div>

    <div id="errorState" class="empty-state" style="display:none;">
      <div class="empty-state-icon"><i data-lucide="layout-grid" class="icon-xl"></i></div>
      <h2>Category Not Found</h2>
      <p>The category you're looking for doesn't exist.</p>
      <a th:href="@{/categories}" class="btn btn-primary">Browse Categories</a>
    </div>

    <div id="categoryContent" style="display:none;">
      <nav class="breadcrumbs" aria-label="Breadcrumb" id="breadcrumbs"></nav>
      <div class="page-header">
        <h1 id="categoryName"></h1>
        <p id="categoryDesc"></p>
        <p id="itemCount"></p>
      </div>

      <div id="emptyItems" class="empty-state" style="display:none;">
        <div class="empty-state-icon"><i data-lucide="package-x" class="icon-xl"></i></div>
        <h2>No Products Found</h2>
        <p>There are no products in this category yet.</p>
        <a th:href="@{/allitems}" class="btn btn-primary">Browse All Products</a>
      </div>

      <div id="itemGrid" class="grid-4" style="display:none;"></div>
      <div id="category-pagination"></div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-js}"></th:block>

<script th:src="@{/js/pagination.js}"></script>
<script>
var currentPage = 0;
var PAGE_SIZE = 12;
var categorySlug = null;

document.addEventListener("DOMContentLoaded", function () {
  categorySlug = window.location.pathname.split("/").pop();
  loadCategoryInfo(categorySlug);
  loadItems(0);
});

function loadCategoryInfo(slug) {
  API.get("/categories/slug/" + slug).then(function (category) {
    document.title = escapeHtml(category.name) + " \u2014 Shoppiq";
    document.getElementById("breadcrumbs").innerHTML =
      '<a href="/">Home</a><span class="separator"><i data-lucide="chevron-right" class="icon-sm"></i></span>' +
      '<a href="/categories">Categories</a><span class="separator"><i data-lucide="chevron-right" class="icon-sm"></i></span>' +
      '<span class="current">' + escapeHtml(category.name) + '</span>';
    document.getElementById("categoryName").textContent = category.name;
    if (category.description) document.getElementById("categoryDesc").textContent = category.description;
  }).catch(function () {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "";
  });
}

function loadItems(page) {
  if (page != null) currentPage = page;
  var grid = document.getElementById("itemGrid");
  var empty = document.getElementById("emptyItems");
  var content = document.getElementById("categoryContent");
  var loading = document.getElementById("loadingState");

  loading.style.display = "";
  grid.style.display = "none";
  empty.style.display = "none";

  API.get("/items/category/" + categorySlug + "?page=" + currentPage + "&size=" + PAGE_SIZE).then(function (data) {
    var items = data.content || [];

    document.getElementById("itemCount").textContent = (data.totalElements || 0) + " products in this category";

    if (items.length === 0) {
      content.style.display = "";
      empty.style.display = "";
      grid.style.display = "none";
    } else {
      grid.innerHTML = items.map(function (item) {
        var imgUrl = item.imageUrl || 'https://plus.unsplash.com/premium_photo-1683746792239-6ce8cdd3ac78?q=80&w=300&fit=crop';
        var hasDiscount = item.discountPercentage && parseFloat(item.discountPercentage) > 0;
        var priceHtml = '<span class="price-new">$' + escapeHtml(String(item.price)) + '</span>';
        if (hasDiscount) {
          var salePrice = (parseFloat(item.price) * (1 - parseFloat(item.discountPercentage) / 100)).toFixed(2);
          priceHtml = '<span class="price-old">$' + escapeHtml(String(item.price)) + '</span> ' +
                      '<span class="price-new">$' + salePrice + '</span> ' +
                      '<span class="price-discount">' + item.discountPercentage + '% Off</span>';
        }
        var stockClass = item.stockQuantity > 10 ? "badge-success" : (item.stockQuantity > 0 ? "badge-warning" : "badge-danger");
        var stockText = item.stockQuantity > 0 ? "In Stock" : "Out of Stock";
        return '<a href="/item/' + item.slug + '" class="card-link"><article class="card product-card">' +
          '<div class="card-image-wrapper">' +
            '<img class="card-image" src="' + (imgUrl) + '" alt="' + escapeAttr(item.name) + '" loading="lazy" width="300" height="300">' +
            (hasDiscount ? '<span class="card-badge badge badge-success">Sale</span>' : '') +
          '</div>' +
          '<div class="card-body">' +
            '<h3 class="card-title">' + escapeHtml(item.name) + '</h3>' +
            '<p class="card-text">' + truncateWords(escapeHtml(item.description || ''), 12) + '</p>' +
            '<div class="card-price">' + priceHtml + '</div>' +
            '<div class="card-meta"><span class="badge ' + stockClass + '">' + stockText + '</span></div>' +
          '</div>' +
        '</article></a>';
      }).join("");
      content.style.display = "";
      grid.style.display = "";
      empty.style.display = "none";
    }

    Pagination.render("category-pagination", data, loadItems, {
      onPageSizeChange: function (newSize) {
        PAGE_SIZE = newSize;
        loadItems(0);
      }
    });
  }).catch(function () {
    content.style.display = "";
    document.getElementById("loadingState").style.display = "none";
  }).finally(function () {
    document.getElementById("loadingState").style.display = "none";
  });
  if (typeof lucide !== "undefined") lucide.createIcons();
}

function escapeHtml(str) { var d = document.createElement("div"); d.appendChild(document.createTextNode(str || "")); return d.innerHTML; }
function escapeAttr(str) { return (str || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function truncateWords(str, max) { if (!str) return ''; var w = str.trim().split(/\s+/); return w.length <= max ? str : w.slice(0, max).join(' ') + '...'; }
</script>
</body>
</html>
