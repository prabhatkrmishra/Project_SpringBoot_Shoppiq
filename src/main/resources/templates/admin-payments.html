<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Payment Management')}"></head>
<body>
<th:block th:replace="~{fragments/admin-header :: admin-header('payments')}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="admin-main">
  <div class="page-header">
    <h1>Payment Management</h1>
    <p>View and manage payment transactions</p>
  </div>

  <div class="admin-summary-grid">
    <div class="summary-card"><div class="label">Total Revenue</div><div class="value success" id="stat-revenue">$0</div></div>
    <div class="summary-card"><div class="label">Completed</div><div class="value" id="stat-completed">0</div></div>
    <div class="summary-card"><div class="label">Pending</div><div class="value warning" id="stat-pending">0</div></div>
    <div class="summary-card"><div class="label">Refunded</div><div class="value danger" id="stat-refunded">0</div></div>
  </div>

  <div class="admin-panel">
    <div class="admin-panel-title">Transaction History</div>
    <div class="table-responsive">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Transaction ID</th>
            <th>Order #</th>
            <th>Customer</th>
            <th>Method</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="payments-body">
          <tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="payments-pagination"></div>
  <div id="paymentModal" class="modal-overlay">
    <div class="modal" style="max-width:550px;width:90%;">
      <div class="modal-header">
        <h3>Payment Details</h3>
        <button class="modal-close" id="payment-modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-payment-body">
        <span class="spinner"></span>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script th:src="@{/js/pagination.js}"></script>
<script>
(function () {
  'use strict';
  var currentPage = 0;
  var PAGE_SIZE = 20;
  function statusClass(s) {
    if (s === 'COMPLETED' || s === 'SUCCESS') return 'active';
    if (s === 'REFUNDED') return 'inactive';
    return 'pending';
  }

  document.addEventListener('DOMContentLoaded', function () {
    API.get('/api/admin/payments/stats').then(function (s) {
      document.getElementById('stat-revenue').textContent = formatCurrency(s && s.totalRevenue ? s.totalRevenue : 0);
      document.getElementById('stat-completed').textContent = (s && s.completedCount) || 0;
      document.getElementById('stat-pending').textContent = (s && s.pendingCount) || 0;
      document.getElementById('stat-refunded').textContent = (s && s.refundedCount) || 0;
    }).catch(function () {});

    document.getElementById('payment-modal-close').addEventListener('click', function () {
      document.getElementById('paymentModal').classList.remove('active');
    });
    document.getElementById('paymentModal').addEventListener('click', function (e) {
      if (e.target === this) this.classList.remove('active');
    });

    function loadPayments(page) {
      if (page != null) currentPage = page;
      API.get('/api/admin/payments?page=' + currentPage + '&size=' + PAGE_SIZE).then(function (data) {
        var payments = data && data.content ? data.content : (Array.isArray(data) ? data : []);
        var tbody = document.getElementById('payments-body');
        if (payments.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No payments found</td></tr>';
          return;
        }
        tbody.innerHTML = '';
        payments.forEach(function (p) {
        var canRefund = p.paymentStatus === 'COMPLETED' || p.paymentStatus === 'SUCCESS';
        var actions = '<button class="btn btn-sm btn-secondary view-payment-btn" data-payment-id="' + p.id + '">View</button>';
        if (canRefund) {
          actions += ' <button class="btn btn-sm btn-danger refund-btn" data-payment-id="' + p.id + '">Refund</button>';
        }
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="text-sm">' + (p.transactionId || p.paymentReference || '') + '</td>' +
          '<td><a href="/order-detail?id=' + p.orderId + '" class="btn-link">#' + p.orderId + '</a></td>' +
          '<td class="text-sm">' + (p.customerUsername || '') + '</td>' +
          '<td class="text-sm">' + (p.paymentMethod || '') + '</td>' +
          '<td>' + formatCurrency(p.amount) + '</td>' +
          '<td class="text-sm text-muted">' + formatDate(p.createdAt) + '</td>' +
          '<td><span class="status-badge ' + statusClass(p.paymentStatus) + '">' + (p.paymentStatus || '') + '</span></td>' +
          '<td class="admin-table-actions">' + actions + '</td>';
        tbody.appendChild(tr);
      });
      initIcons();
      tbody.querySelectorAll('.view-payment-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var paymentId = this.dataset.paymentId;
          document.getElementById('modal-payment-body').innerHTML = '<span class="spinner"></span>';
          document.getElementById('paymentModal').classList.add('active');
          API.get('/api/admin/payments/' + paymentId).then(function (p) {
            var html = '<div class="mb-md"><strong>Payment ID:</strong> #' + p.id + '</div>';
            html += '<div class="mb-md"><strong>Reference:</strong> ' + (p.paymentReference || '') + '</div>';
            html += '<div class="mb-md"><strong>Order:</strong> <a href="/order-detail?id=' + p.orderId + '" class="btn-link">#' + p.orderId + '</a></div>';
            html += '<div class="mb-md"><strong>Customer:</strong> ' + (p.customerUsername || '') + '</div>';
            html += '<div class="mb-md"><strong>Method:</strong> ' + (p.paymentMethod || '') + '</div>';
            html += '<div class="mb-md"><strong>Gateway:</strong> ' + (p.gateway || '') + '</div>';
            html += '<div class="mb-md"><strong>Amount:</strong> ' + formatCurrency(p.amount) + ' ' + (p.currency || '') + '</div>';
            html += '<div class="mb-md"><strong>Transaction ID:</strong> ' + (p.transactionId || 'N/A') + '</div>';
            html += '<div class="mb-md"><strong>Status:</strong> <span class="status-badge ' + statusClass(p.paymentStatus) + '">' + (p.paymentStatus || '') + '</span></div>';
            html += '<div class="mb-md"><strong>Created:</strong> ' + formatDate(p.createdAt) + '</div>';
            if (p.paidAt) html += '<div class="mb-md"><strong>Paid At:</strong> ' + formatDate(p.paidAt) + '</div>';
            document.getElementById('modal-payment-body').innerHTML = html;
          }).catch(function (err) {
            document.getElementById('modal-payment-body').innerHTML = '<p class="text-danger">' + (err.message || 'Failed to load') + '</p>';
          });
        });
      });
      tbody.querySelectorAll('.refund-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = this.dataset.paymentId;
          showConfirmModal({ title: 'Refund Payment', message: 'Refund this payment?', confirmText: 'Refund', danger: true }).then(function (confirmed) {
            if (!confirmed) return;
            API.put('/api/admin/payments/' + id + '/refund').then(function () {
              showToast('Payment refunded', 'success');
              window.location.reload();
            }).catch(function (e) { showToast(e.message, 'error'); });
          });
        });
      });
      Pagination.render('payments-pagination', data, loadPayments, {
        onPageSizeChange: function (newSize) {
          PAGE_SIZE = newSize;
          loadPayments(0);
        }
      });
      }).catch(function () {
        document.getElementById('payments-body').innerHTML =
          '<tr><td colspan="8" class="text-center text-muted">Failed to load payments</td></tr>';
      });
    }
    loadPayments();
  });
})();
</script>
</body>
</html>
