<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Alert</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background-color: #f4f4f4;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4; padding: 20px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #dc2626; padding: 30px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Security Alert</h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px 30px;">
                            <h2 style="color: #1e293b; margin: 0 0 20px 0;" th:text="${alertTitle} ?: 'Security Alert'">Security Alert</h2>

                            <p style="color: #475569; line-height: 1.6; margin: 0 0 20px 0;">
                                Hello <strong th:text="${userName}">User</strong>,
                            </p>

                            <p style="color: #475569; line-height: 1.6; margin: 0 0 20px 0;" th:text="${alertMessage}">
                                We detected a security event on your account.
                            </p>

                            <!-- Alert Details -->
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin: 20px 0; background-color: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                                <tr>
                                    <td style="padding: 20px;">
                                        <p style="color: #64748b; font-size: 14px; margin: 0 0 10px 0;">
                                            <strong>Event:</strong> <span th:text="${alertType} ?: 'Unknown'">Unknown</span>
                                        </p>
                                        <p style="color: #64748b; font-size: 14px; margin: 0 0 10px 0;">
                                            <strong>Time:</strong> <span th:text="${alertTime} ?: 'Unknown'">Unknown</span>
                                        </p>
                                        <p style="color: #64748b; font-size: 14px; margin: 0;">
                                            <strong>IP Address:</strong> <span th:text="${ipAddress} ?: 'Unknown'">Unknown</span>
                                        </p>
                                    </td>
                                </tr>
                            </table>

                            <!-- Security Recommendation -->
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin: 30px 0 0 0; background-color: #fef2f2; border-radius: 8px; border: 1px solid #fecaca;">
                                <tr>
                                    <td style="padding: 15px;">
                                        <p style="color: #991b1b; font-size: 14px; margin: 0;">
                                            <strong>Important:</strong> If this wasn't you, please change your password immediately and contact support.
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8fafc; padding: 20px 30px; text-align: center; border-top: 1px solid #e2e8f0;">
                            <p style="color: #94a3b8; font-size: 12px; margin: 0;">
                                This is a transactional email from Shoppiq.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
