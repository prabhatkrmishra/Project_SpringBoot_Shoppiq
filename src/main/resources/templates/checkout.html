<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/header :: head('Checkout')}"></head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="page">
  <div class="container">
    <div class="page-header">
      <h1>Checkout</h1>
    </div>

    <div class="checkout-progress" role="progressbar" aria-valuenow="1" aria-valuemin="1" aria-valuemax="3">
      <span class="step active"><span class="step-dot"></span> Cart</span>
      <span class="step-line"></span>
      <span class="step"><span class="step-dot"></span> Details</span>
      <span class="step-line"></span>
      <span class="step"><span class="step-dot"></span> Pay</span>
    </div>

    <div class="guest-banner" sec:authorize="!isAuthenticated()">
      <p>Checking out as a guest. <a th:href="@{/login}" class="btn-link">Sign in</a> for faster checkout.</p>
    </div>

    <div id="checkout-loading" class="flex-center" style="padding:3rem;">
      <span class="spinner"></span>
    </div>

    <form id="checkout-form" class="checkout-page" style="display:none;">
      <div class="checkout-main">
        <section class="checkout-section" aria-labelledby="shipping-heading">
          <div class="checkout-section-header">
            <h2 id="shipping-heading"><span class="checkout-step-number">1</span> Shipping Address</h2>
          </div>
          <div id="address-list"></div>
          <div id="no-addresses" style="display:none;" class="text-muted text-sm mb-md">
            No saved addresses. Please add one in your <a href="/address" class="btn-link">address book</a> first.
          </div>
        </section>

        <section class="checkout-section" aria-labelledby="payment-heading">
          <div class="checkout-section-header">
            <h2 id="payment-heading"><span class="checkout-step-number">2</span> Payment Method</h2>
          </div>
          <div class="payment-methods">
            <label class="payment-method selected">
              <input type="radio" name="paymentMethod" value="CREDIT_CARD" checked>
              <div>
                <div class="method-label">Credit Card</div>
                <div class="method-desc">Visa, Mastercard, Amex</div>
              </div>
            </label>
            <label class="payment-method">
              <input type="radio" name="paymentMethod" value="PAYPAL">
              <div>
                <div class="method-label">PayPal</div>
                <div class="method-desc">Pay with your PayPal account</div>
              </div>
            </label>
            <label class="payment-method">
              <input type="radio" name="paymentMethod" value="STRIPE">
              <div>
                <div class="method-label">Stripe</div>
                <div class="method-desc">Secure card payments via Stripe</div>
              </div>
            </label>
          </div>
        </section>

        <section class="checkout-section" aria-labelledby="review-heading">
          <div class="checkout-section-header">
            <h2 id="review-heading"><span class="checkout-step-number">3</span> Review Items</h2>
          </div>
          <div id="review-items"></div>
        </section>
      </div>

      <aside class="checkout-sidebar">
        <div class="checkout-section">
          <div class="cart-summary-title">Order Summary</div>
          <div class="cart-summary-row"><span>Subtotal</span><span id="checkout-subtotal">$0.00</span></div>
          <div class="cart-summary-row"><span>Shipping</span><span>Calculated at checkout</span></div>
          <div class="cart-summary-row total"><span>Total</span><span id="checkout-total">$0.00</span></div>
          <div class="cart-actions">
            <button type="submit" id="place-order-btn" class="btn btn-primary btn-lg btn-block">Place Order</button>
          </div>
        </div>
      </aside>
    </form>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script>
(function () {
  'use strict';
  var selectedAddressId = null;

  function renderAddresses(addresses) {
    var list = document.getElementById('address-list');
    var noMsg = document.getElementById('no-addresses');
    if (!addresses || addresses.length === 0) {
      list.style.display = 'none';
      noMsg.style.display = '';
      return;
    }
    noMsg.style.display = 'none';
    list.style.display = '';
    list.innerHTML = '<div class="address-radio-list"></div>';
    var container = list.querySelector('.address-radio-list');
    addresses.forEach(function (addr) {
      var div = document.createElement('label');
      div.className = 'payment-method' + (addr['default'] ? ' selected' : '');
      div.innerHTML =
        '<input type="radio" name="addressId" value="' + addr.id + '"' + (addr['default'] ? ' checked' : '') + '>' +
        '<div>' +
          '<div class="method-label">' + (addr.fullName || '') + (addr.label ? ' (' + addr.label + ')' : '') + '</div>' +
          '<div class="method-desc">' +
            (addr.line1 || '') + (addr.line2 ? ', ' + addr.line2 : '') + '<br>' +
            (addr.city || '') + ', ' + (addr.state || '') + ' ' + (addr.postalCode || '') + '<br>' +
            (addr.country || '') +
            (addr.phone ? ' · ' + addr.phone : '') +
          '</div>' +
        '</div>';
      div.querySelector('input').addEventListener('change', function () {
        selectedAddressId = addr.id;
        container.querySelectorAll('.payment-method').forEach(function (el) { el.classList.remove('selected'); });
        div.classList.add('selected');
      });
      if (addr['default']) selectedAddressId = addr.id;
      container.appendChild(div);
    });
    if (!selectedAddressId && addresses.length > 0) selectedAddressId = addresses[0].id;
  }

  function renderReviewItems(cart) {
    var container = document.getElementById('review-items');
    container.innerHTML = '';
    (cart.items || []).forEach(function (item) {
      var imgUrl = item.imageUrl || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=48&h=48&fit=crop';
      var div = document.createElement('div');
      div.className = 'order-review-item';
      div.innerHTML =
        '<img class="item-thumb" src="' + imgUrl + '" alt="" loading="lazy" width="48" height="48">' +
        '<div class="item-info">' +
          '<div class="item-name">' + (item.itemName || 'Product') + '</div>' +
          '<div class="item-qty">Qty: ' + item.quantity + '</div>' +
        '</div>' +
        '<div class="item-price">' + formatCurrency(item.lineTotal) + '</div>';
      container.appendChild(div);
    });
    document.getElementById('checkout-subtotal').textContent = formatCurrency(cart.subtotal);
    document.getElementById('checkout-total').textContent = formatCurrency(cart.subtotal);
  }

  function init() {
    document.getElementById('checkout-loading').style.display = 'none';
    document.getElementById('checkout-form').style.display = '';
  }

  document.addEventListener('DOMContentLoaded', function () {
    Promise.all([
      API.get('/user/cart/get'),
      API.get('/user/address/get/all')
    ]).then(function (results) {
      var cart = results[0];
      var addresses = results[1];
      renderReviewItems(cart);
      renderAddresses(addresses);
      init();
    }).catch(function (err) {
      showToast(err.message || 'Failed to load checkout data', 'error');
      init();
    });

    document.getElementById('checkout-form').addEventListener('submit', function (e) {
      e.preventDefault();
      if (!selectedAddressId) {
        showToast('Please select a shipping address', 'error');
        return;
      }
      var paymentMethod = document.querySelector('input[name="paymentMethod"]:checked');
      if (!paymentMethod) {
        showToast('Please select a payment method', 'error');
        return;
      }
      var btn = document.getElementById('place-order-btn');
      setButtonLoading(btn, true);
      API.post('/user/order/checkout', {
        addressId: selectedAddressId,
        paymentMethod: paymentMethod.value
      }).then(function (res) {
        showToast('Order placed successfully!', 'success');
        if (paymentMethod.value !== 'COD' && res.paymentId) {
          var simulatedTxn = 'TEST-' + res.paymentId + '-' + Date.now();
          return API.post('/user/payment/verify', {
            paymentId: res.paymentId,
            transactionId: simulatedTxn
          }).catch(function (e) {
            console.warn('Payment verification skipped:', e.message);
          }).then(function () { return res; });
        }
        return res;
      }).then(function (res) {
        window.location.href = '/order-detail?id=' + res.orderId;
      }).catch(function (err) {
        showToast(err.message || 'Failed to place order', 'error');
        setButtonLoading(btn, false);
      });
    });
  });
})();
</script>
</body>
</html>
