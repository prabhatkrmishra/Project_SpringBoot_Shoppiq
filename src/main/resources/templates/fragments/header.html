<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Shoppiq</title>
    <meta name="description" content="Shoppiq — your modern shopping destination">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta name="shoppiq-authenticated" content="true" sec:authorize="isAuthenticated()">
    <meta name="shoppiq-user-id" th:content="${#authentication?.principal?.id}" sec:authorize="isAuthenticated()">
    <link rel="icon" th:href="@{/images/favicon.svg}" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js" defer></script>
    <script th:src="@{/js/api.js}" defer></script>
    <script th:src="@{/js/productCard.js}" defer></script>
    <script th:src="@{/js/main.js}" defer></script>
    <script th:src="@{/js/chat.js}" defer></script>
</head>
<body>
    <th:block th:fragment="header">
        <header class="site-header">
            <div class="header-inner">
                <a th:href="@{/}" class="header-brand" aria-label="Shoppiq Home">Shoppiq</a>
                <nav class="header-nav" aria-label="Main navigation">
                    <a th:href="@{/allitems}"><i data-lucide="store" class="icon-sm"></i><span>Shop</span></a>
                    <a th:href="@{/new-arrivals}"><i data-lucide="sparkles"
                                                     class="icon-sm"></i><span>New Arrivals</span></a>
                    <a th:href="@{/sale}"><i data-lucide="tag" class="icon-sm"></i><span>Sale</span></a>
                    <a th:href="@{/categories}"><i data-lucide="layout-grid" class="icon-sm"></i><span>Categories</span></a>
                    <a sec:authorize="isAuthenticated() and !hasRole('ADMIN') and !hasRole('SELLER')"
                       th:href="@{/cart}"><i
                            data-lucide="shopping-cart"
                            class="icon-sm"></i><span>Cart</span></a>
                    <a sec:authorize="isAuthenticated() and !hasRole('ADMIN') and !hasRole('SELLER')"
                       th:href="@{/orders}"><i data-lucide="package"
                                               class="icon-sm"></i><span>Orders</span></a>
                    <a sec:authorize="isAuthenticated()" th:href="@{/profile}"><i data-lucide="user"
                                                                                  class="icon-sm"></i><span>Profile</span></a>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}"><i data-lucide="shield"
                                                                                         class="icon-sm"></i><span>Admin</span></a>
                </nav>
                <div class="header-actions">
                    <div sec:authorize="!isAuthenticated()">
                        <a th:href="@{/login}" class="btn btn-sm btn-header-outlined"><i data-lucide="log-in"
                                                                                         class="icon-sm"></i> Sign
                            In</a>
                    </div>
                    <div sec:authorize="isAuthenticated()" class="flex items-center gap-xs">
                        <a th:href="@{/profile}" class="btn btn-sm btn-header-ghost"
                           sec:authentication="name">Account</a>
                        <a href="#" class="btn btn-sm btn-header-muted" onclick="window.handleLogout(event)"><i
                                data-lucide="log-out"
                                class="icon-sm"></i> Logout</a>
                    </div>
                    <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
            <div class="mobile-menu" aria-hidden="true">
                <a th:href="@{/allitems}"><i data-lucide="store" class="icon-sm"></i><span>Shop</span></a>
                <a th:href="@{/new-arrivals}"><i data-lucide="sparkles"
                                                 class="icon-sm"></i><span>New Arrivals</span></a>
                <a th:href="@{/sale}"><i data-lucide="tag" class="icon-sm"></i><span>Sale</span></a>
                <a th:href="@{/categories}"><i data-lucide="layout-grid" class="icon-sm"></i><span>Categories</span></a>
                <a sec:authorize="isAuthenticated() and !hasRole('ADMIN') and !hasRole('SELLER')" th:href="@{/cart}"><i
                        data-lucide="shopping-cart"
                        class="icon-sm"></i><span>Cart</span></a>
                <a sec:authorize="isAuthenticated() and !hasRole('ADMIN') and !hasRole('SELLER')"
                   th:href="@{/orders}"><i
                        data-lucide="package"
                        class="icon-sm"></i><span>Orders</span></a>
                <a sec:authorize="isAuthenticated()" th:href="@{/profile}"><i data-lucide="user"
                                                                              class="icon-sm"></i><span>Profile</span></a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}"><i data-lucide="shield"
                                                                                     class="icon-sm"></i><span>Admin</span></a>
                <hr class="mobile-menu-divider">
                <a sec:authorize="!isAuthenticated()" th:href="@{/login}"><i data-lucide="log-in"
                                                                             class="icon-sm"></i><span>Sign In</span></a>
                <a sec:authorize="isAuthenticated()" href="#" onclick="window.handleLogout(event)"><i
                        data-lucide="log-out"
                        class="icon-sm"></i><span>Logout</span></a>
            </div>
        </header>
        <button class="back-to-top" aria-label="Back to top">
            <i data-lucide="arrow-up" class="icon"></i>
        </button>
        <th:block th:replace="~{fragments/chat-widget :: widget}"></th:block>
    </th:block>
</body>
</html>
