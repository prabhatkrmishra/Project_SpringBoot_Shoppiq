<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('New Arrivals')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container">
            <div class="page-header">
                <h1>New Arrivals</h1>
                <p>Check out the latest products just added to our store</p>
            </div>

            <div id="emptyState" class="cart-empty" style="display:none;">
                <h2>No new arrivals yet</h2>
                <p>Check back soon for the latest products.</p>
                <a href="/allitems" class="btn btn-primary">Browse All Products</a>
            </div>

            <div id="loadingState" class="text-center" style="padding:48px 0;">
                <div class="spinner"></div>
                <p class="text-muted mt-md">Loading new arrivals...</p>
            </div>

            <div id="itemGrid" class="grid-4" style="display:none;"></div>
            <div id="arrivals-pagination"></div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-js}"></th:block>

    <script th:src="@{/js/pagination.js}"></script>
    <script>
        var currentPage = 0;
        var PAGE_SIZE = 12;

        document.addEventListener("DOMContentLoaded", function () {
            loadNewArrivals(0);
        });

        function loadNewArrivals(page) {
            if (page != null) currentPage = page;
            var grid = document.getElementById("itemGrid");
            var empty = document.getElementById("emptyState");
            var loading = document.getElementById("loadingState");
            loading.style.display = "";
            grid.style.display = "none";
            empty.style.display = "none";

            API.get("/items/new-arrivals?page=" + currentPage + "&size=" + PAGE_SIZE).then(function (data) {
                var items = data && data.content ? data.content : (Array.isArray(data) ? data : []);
                if (items.length === 0) {
                    empty.style.display = "";
                    grid.style.display = "none";
                } else {
                    ProductCard.renderGrid(grid, items, {showStock: true});
                    empty.style.display = "none";
                }
                Pagination.render("arrivals-pagination", data, loadNewArrivals, {
                    onPageSizeChange: function (newSize) {
                        PAGE_SIZE = newSize;
                        loadNewArrivals(0);
                    }
                });
            }).catch(function (e) {
                empty.style.display = "";
                empty.querySelector("h2").textContent = "Could not load new arrivals";
                empty.querySelector("p").textContent = e.message || "Please try again later.";
            }).finally(function () {
                loading.style.display = "none";
                if (typeof lucide !== "undefined") lucide.createIcons();
            });
        }
    </script>
</body>
</html>
