spring:
  devtools:
    add-properties: false

server:
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      # Permissive: trust any proxy for Cloudflare compatibility
      # See: https://www.cloudflare.com/ips/
      internal-proxies: ".*"

  servlet:
    session:
      cookie:
        secure: true
        same-site: none
        http-only: true

  web:
    error:
      include-message: never
      include-binding-errors: never
      include-stacktrace: never

# Logging configuration
# Available levels (create most to least verbose):
#   TRACE - Everything including framework internals
#   DEBUG - Debug messages, Info, Warn, Error
#   INFO  - Informational messages, Warn, Error
#   WARN  - Warnings and Errors only
#   ERROR - Errors only
#   OFF   - Disable all logging
logging:
  level:
    com.pkmprojects.shoppiq: WARN
    dev.langchain4j: WARN

app:
  security:
    secure-cookie: true
  cors:
    enabled: true
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

shoppiq:
  email:
    provider: smtp