<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Addresses — Shoppiq</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: #f5f5f0;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 40px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            color: #111;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #555;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 3px;
            transition: color 0.15s;
        }

        .nav-link:hover { color: #111; }

        .logout-btn {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #555;
            background: none;
            border: 1px solid #ccc;
            padding: 6px 16px;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .logout-btn:hover { border-color: #111; color: #111; }

        /* ── Main layout ── */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }

        .section-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        /* ── Address grid ── */
        .address-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .address-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 20px;
            position: relative;
            transition: box-shadow 0.15s;
        }

        .address-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

        .address-card.is-default {
            border-color: #111;
        }

        .default-badge {
            display: inline-block;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: #111;
            color: #fff;
            padding: 2px 8px;
            border-radius: 2px;
            margin-bottom: 10px;
        }

        .address-label {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }

        .address-name {
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Segoe UI', sans-serif;
            margin-bottom: 4px;
        }

        .address-text {
            font-size: 0.85rem;
            font-family: 'Segoe UI', sans-serif;
            color: #444;
            line-height: 1.6;
        }

        .address-phone {
            font-size: 0.82rem;
            font-family: 'Segoe UI', sans-serif;
            color: #666;
            margin-top: 8px;
        }

        .address-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            border: 1px solid transparent;
        }

        .btn-outline {
            background: none;
            border-color: #ccc;
            color: #555;
        }

        .btn-outline:hover { border-color: #111; color: #111; }

        .btn-primary {
            background: #111;
            color: #fff;
            border-color: #111;
        }

        .btn-primary:hover { background: #333; border-color: #333; }

        .btn-danger {
            background: none;
            border-color: #e53e3e;
            color: #e53e3e;
        }

        .btn-danger:hover { background: #e53e3e; color: #fff; }

        /* ── Add address button ── */
        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 10px 24px;
            border-radius: 3px;
            cursor: pointer;
            background: #111;
            color: #fff;
            border: none;
            transition: background 0.15s;
            margin-bottom: 32px;
        }

        .add-btn:hover { background: #333; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.9rem;
        }

        /* ── Modal overlay ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 4px;
            padding: 32px;
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-title {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 24px;
            color: #111;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #888;
        }

        .modal-close:hover { color: #111; }

        /* ── Form ── */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group.full { grid-column: 1 / -1; }

        label {
            display: block;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="tel"] {
            width: 100%;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.88rem;
            padding: 8px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 3px;
            background: #fafafa;
            color: #111;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus,
        input[type="tel"]:focus {
            outline: none;
            border-color: #111;
            background: #fff;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.82rem;
            color: #444;
        }

        .checkbox-row input { width: 16px; height: 16px; cursor: pointer; }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.82rem;
            padding: 12px 20px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 200;
            pointer-events: none;
        }

        .toast.error { background: #e53e3e; }
        .toast.show { opacity: 1; }

        /* ── Loading ── */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-top-color: #111;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
    <h1>Shoppiq</h1>
    <nav class="header-nav">
        <a href="/allitems" class="nav-link">Shop</a>
        <button class="logout-btn" onclick="logout()">Log out</button>
    </nav>
</header>

<!-- ── Main ── -->
<main class="main">
    <p class="section-label">My Addresses</p>

    <button class="add-btn" onclick="openAddModal()">
        + Add Address
    </button>

    <div id="address-grid" class="address-grid">
        <!-- populated by JS -->
    </div>

    <div id="empty-state" class="empty-state" style="display:none;">
        You have no saved addresses. Add one to get started.
    </div>
</main>

<!-- ── Modal ── -->
<div id="modal-overlay" class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal">
        <p id="modal-title" class="modal-title">Add Address</p>
        <button class="modal-close" onclick="closeModal()">✕</button>

        <div class="form-row">
            <div class="form-group">
                <label for="f-label">Label</label>
                <input type="text" id="f-label" placeholder="Home, Office…" maxlength="30">
            </div>
            <div class="form-group">
                <label for="f-phone">Phone</label>
                <input type="tel" id="f-phone" placeholder="9876543210" maxlength="15">
            </div>

            <div class="form-group full">
                <label for="f-fullname">Full Name</label>
                <input type="text" id="f-fullname" placeholder="Recipient's name" maxlength="100">
            </div>

            <div class="form-group full">
                <label for="f-line1">Address Line 1</label>
                <input type="text" id="f-line1" placeholder="Street, building, flat…" maxlength="255">
            </div>

            <div class="form-group full">
                <label for="f-line2">Address Line 2 <span style="color:#aaa;">(optional)</span></label>
                <input type="text" id="f-line2" placeholder="Landmark, area…" maxlength="255">
            </div>

            <div class="form-group">
                <label for="f-city">City</label>
                <input type="text" id="f-city" maxlength="100">
            </div>

            <div class="form-group">
                <label for="f-state">State</label>
                <input type="text" id="f-state" maxlength="100">
            </div>

            <div class="form-group">
                <label for="f-postal">Postal Code</label>
                <input type="text" id="f-postal" maxlength="10">
            </div>

            <div class="form-group">
                <label for="f-country">Country</label>
                <input type="text" id="f-country" maxlength="100">
            </div>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" id="f-default">
            <label for="f-default" style="text-transform:none;font-size:0.85rem;color:#333;letter-spacing:0;">
                Set as default address
            </label>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="save-btn" onclick="saveAddress()">Save</button>
        </div>
    </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="toast"></div>

<script>
    const API = '/user/address';
    let editingId = null;

    // ── Bootstrap ──────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', loadAddresses);

    async function loadAddresses() {
        try {
            const data = await apiFetch(`${API}/get`);
            renderAddresses(data);
        } catch (e) {
            toast(e.message || 'Failed to load addresses.', true);
        }
    }

    // ── Render ─────────────────────────────────────────────────────

    function renderAddresses(addresses) {
        const grid = document.getElementById('address-grid');
        const empty = document.getElementById('empty-state');

        grid.innerHTML = '';

        if (!addresses.length) {
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';

        // Sort: default first
        addresses.sort((a, b) => (b.default ? 1 : 0) - (a.default ? 1 : 0));

        addresses.forEach(addr => grid.appendChild(buildCard(addr)));
    }

    function buildCard(addr) {
        const card = document.createElement('div');
        card.className = 'address-card' + (addr.default ? ' is-default' : '');
        card.dataset.id = addr.id;

        const line2 = addr.line2 ? `${addr.line2}, ` : '';

        card.innerHTML = `
            ${addr.default ? '<span class="default-badge">Default</span>' : ''}
            <p class="address-label">${esc(addr.label)}</p>
            <p class="address-name">${esc(addr.fullName)}</p>
            <p class="address-text">
                ${esc(addr.line1)}<br>
                ${line2}${esc(addr.city)}, ${esc(addr.state)} ${esc(addr.postalCode)}<br>
                ${esc(addr.country)}
            </p>
            <p class="address-phone">${esc(addr.phone)}</p>
            <div class="address-actions">
                ${!addr.default ? `<button class="btn btn-outline" onclick="makeDefault(${addr.id})">Set Default</button>` : ''}
                <button class="btn btn-outline" onclick="openEditModal(${addr.id})">Edit</button>
                <button class="btn btn-danger" onclick="deleteAddress(${addr.id})">Delete</button>
            </div>
        `;

        return card;
    }

    // ── Modal ──────────────────────────────────────────────────────

    function openAddModal() {
        editingId = null;
        clearForm();
        document.getElementById('modal-title').textContent = 'Add Address';
        document.getElementById('save-btn').textContent = 'Save';
        document.getElementById('modal-overlay').classList.add('open');
    }

    function openEditModal(id) {
        editingId = id;
        // pull current values from the rendered card
        const addr = cachedAddresses.find(a => a.id === id);
        if (!addr) return;

        document.getElementById('f-label').value    = addr.label;
        document.getElementById('f-fullname').value = addr.fullName;
        document.getElementById('f-phone').value    = addr.phone;
        document.getElementById('f-line1').value    = addr.line1;
        document.getElementById('f-line2').value    = addr.line2 || '';
        document.getElementById('f-city').value     = addr.city;
        document.getElementById('f-state').value    = addr.state;
        document.getElementById('f-postal').value   = addr.postalCode;
        document.getElementById('f-country').value  = addr.country;
        document.getElementById('f-default').checked = addr.default;

        document.getElementById('modal-title').textContent = 'Edit Address';
        document.getElementById('save-btn').textContent = 'Update';
        document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
        editingId = null;
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    function clearForm() {
        ['f-label','f-fullname','f-phone','f-line1','f-line2',
         'f-city','f-state','f-postal','f-country'].forEach(id => {
            document.getElementById(id).value = '';
        });
        document.getElementById('f-default').checked = false;
    }

    // ── CRUD ───────────────────────────────────────────────────────

    async function saveAddress() {
        const body = {
            label:      document.getElementById('f-label').value.trim(),
            fullName:   document.getElementById('f-fullname').value.trim(),
            phone:      document.getElementById('f-phone').value.trim(),
            line1:      document.getElementById('f-line1').value.trim(),
            line2:      document.getElementById('f-line2').value.trim() || null,
            city:       document.getElementById('f-city').value.trim(),
            state:      document.getElementById('f-state').value.trim(),
            postalCode: document.getElementById('f-postal').value.trim(),
            country:    document.getElementById('f-country').value.trim(),
            default:    document.getElementById('f-default').checked
        };

        try {
            setSaveBtnLoading(true);
            if (editingId) {
                await apiFetch(`${API}/update/${editingId}`, 'PUT', body);
                toast('Address updated.');
            } else {
                await apiFetch(`${API}/create`, 'POST', body);
                toast('Address added.');
            }
            closeModal();
            await loadAddresses();
        } catch (e) {
            toast(e.message || 'Could not save address.', true);
        } finally {
            setSaveBtnLoading(false);
        }
    }

    async function deleteAddress(id) {
        if (!confirm('Delete this address?')) return;
        try {
            await apiFetch(`${API}/delete/${id}`, 'DELETE');
            toast('Address deleted.');
            await loadAddresses();
        } catch (e) {
            toast(e.message || 'Could not delete address.', true);
        }
    }

    async function makeDefault(id) {
        try {
            await apiFetch(`${API}/default/${id}`, 'PUT');
            toast('Default address updated.');
            await loadAddresses();
        } catch (e) {
            toast(e.message || 'Could not update default.', true);
        }
    }

    // ── Helpers ────────────────────────────────────────────────────

    let cachedAddresses = [];

    async function apiFetch(url, method = 'GET', body = null) {
        const opts = {
            method,
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
        };
        if (body) opts.body = JSON.stringify(body);

        const res = await fetch(url, opts);

        if (res.status === 204) return null;

        const json = await res.json().catch(() => ({}));

        if (!res.ok) {
            throw new Error(json.detail || json.message || `Error ${res.status}`);
        }

        // cache after successful GET /get
        if (method === 'GET' && url.endsWith('/get')) cachedAddresses = json;

        return json;
    }

    function esc(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function toast(msg, isError = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast' + (isError ? ' error' : '') + ' show';
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    function setSaveBtnLoading(loading) {
        const btn = document.getElementById('save-btn');
        btn.disabled = loading;
        btn.innerHTML = loading ? '<span class="spinner"></span>' : (editingId ? 'Update' : 'Save');
    }

    function logout() {
        fetch('/auth/logout', { method: 'POST', credentials: 'include' })
            .finally(() => window.location.href = '/login');
    }
</script>

</body>
</html>
