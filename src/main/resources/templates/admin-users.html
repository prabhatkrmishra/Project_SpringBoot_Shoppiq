<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Customer Management')}"></head>
<body>
<th:block th:replace="~{fragments/admin-header :: admin-header('users')}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="admin-main">
  <div class="page-header">
    <h1>Customer Management</h1>
    <p>View and manage registered customers</p>
  </div>

  <div class="admin-summary-grid">
    <div class="summary-card"><div class="label">Total Customers</div><div class="value" id="stat-total">0</div></div>
    <div class="summary-card"><div class="label">Active</div><div class="value success" id="stat-active">0</div></div>
    <div class="summary-card"><div class="label">Blocked</div><div class="value danger" id="stat-blocked">0</div></div>
    <div class="summary-card"><div class="label">New This Month</div><div class="value warning" id="stat-new">0</div></div>
  </div>

  <div class="admin-panel">
    <div class="admin-panel-title">All Customers</div>
    <div class="table-responsive">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Orders</th>
            <th>Joined</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="users-pagination"></div>
  <div id="userModal" class="modal-overlay">
    <div class="modal" style="max-width:500px;width:90%;">
      <div class="modal-header">
        <h3>User Details</h3>
        <button class="modal-close" id="user-modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-user-body">
        <span class="spinner"></span>
      </div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script th:src="@{/js/pagination.js}"></script>
<script src="/js/sanitize.js"></script>
<script>
(function () {
  'use strict';
  var currentPage = 0;
  var PAGE_SIZE = 20;
  function renderUsers(users) {
    var tbody = document.getElementById('users-body');
    if (!users || users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No customers found</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    users.forEach(function (u) {
      var roles = Array.isArray(u.roles) ? u.roles.join(', ') : (u.roles || '');
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><strong>' + escapeHtml(u.name || u.username || '') + '</strong></td>' +
        '<td class="text-sm">' + escapeHtml(u.email || '') + '</td>' +
        '<td><span class="badge badge-neutral">' + escapeHtml(roles) + '</span></td>' +
        '<td>' + (u.totalOrders || 0) + '</td>' +
        '<td class="text-sm text-muted">' + formatDate(u.createdAt) + '</td>' +
        '<td><span class="status-badge ' + (u.enabled ? 'active' : 'inactive') + '">' + (u.enabled ? 'Active' : 'Disabled') + '</span></td>' +
        '<td class="admin-table-actions">' +
          '<button class="btn btn-sm btn-secondary view-user-btn" data-user-id="' + u.id + '">View</button>' +
          '<button class="btn btn-sm btn-ghost toggle-btn" style="margin-left:auto" data-user-id="' + u.id + '" data-enabled="' + u.enabled + '" aria-label="' + (u.enabled ? 'Disable' : 'Enable') + '">' +
            '<i data-lucide="' + (u.enabled ? 'user-x' : 'user-check') + '" class="icon-sm"></i>' +
          '</button>' +
        '</td>';
      tbody.appendChild(tr);
    });
    initIcons();
    tbody.querySelectorAll('.view-user-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var userId = this.dataset.userId;
        var modal = document.getElementById('userModal');
        document.getElementById('modal-user-body').innerHTML = '<span class="spinner"></span>';
        modal.classList.add('active');
        API.get('/api/admin/users/' + userId).then(function (u) {
          var roles = Array.isArray(u.roles) ? u.roles.join(', ') : (u.roles || '');
          var html = '<div class="mb-md"><strong>Name:</strong> ' + escapeHtml(u.name || '') + '</div>';
          html += '<div class="mb-md"><strong>Username:</strong> ' + escapeHtml(u.username || '') + '</div>';
          html += '<div class="mb-md"><strong>Email:</strong> ' + escapeHtml(u.email || '') + '</div>';
          html += '<div class="mb-md"><strong>Roles:</strong> <span class="badge badge-neutral">' + escapeHtml(roles) + '</span></div>';
          html += '<div class="mb-md"><strong>Status:</strong> <span class="status-badge ' + (u.enabled ? 'active' : 'inactive') + '">' + (u.enabled ? 'Active' : 'Disabled') + '</span></div>';
          html += '<div class="mb-md"><strong>Orders:</strong> ' + (u.totalOrders || 0) + '</div>';
          html += '<div class="mb-md"><strong>Total Spent:</strong> ' + formatCurrency(u.totalSpent || 0) + '</div>';
          html += '<div class="mb-md"><strong>Joined:</strong> ' + formatDate(u.createdAt) + '</div>';
          if (u.updatedAt) html += '<div class="mb-md"><strong>Last Updated:</strong> ' + formatDate(u.updatedAt) + '</div>';
          document.getElementById('modal-user-body').innerHTML = html;
        }).catch(function (err) {
          document.getElementById('modal-user-body').innerHTML = '<p class="text-danger">' + escapeHtml(err.message || 'Failed to load') + '</p>';
        });
      });
    });
    tbody.querySelectorAll('.toggle-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var userId = this.dataset.userId;
        var enabled = this.dataset.enabled === 'true';
        var action = enabled ? 'block' : 'unblock';
        showConfirmModal({ title: 'Confirm Action', message: 'Are you sure you want to ' + action + ' this user?', confirmText: action.charAt(0).toUpperCase() + action.slice(1), danger: enabled }).then(function (confirmed) {
          if (!confirmed) return;
          API.put('/api/admin/users/' + userId + '/' + action).then(function () {
            showToast('User ' + action + 'ed', 'success');
            loadUsers();
          }).catch(function (e) { showToast(e.message, 'error'); });
        });
      });
    });
  }

  function loadUsers(page) {
    if (page != null) currentPage = page;
    API.get('/api/admin/users?page=' + currentPage + '&size=' + PAGE_SIZE).then(function (data) {
      var users = data && data.content ? data.content : (Array.isArray(data) ? data : []);
      renderUsers(users);
      Pagination.render('users-pagination', data, loadUsers, {
        onPageSizeChange: function (newSize) {
          PAGE_SIZE = newSize;
          loadUsers(0);
        }
      });
    }).catch(function () {
      document.getElementById('users-body').innerHTML =
        '<tr><td colspan="7" class="text-center text-muted">Failed to load users</td></tr>';
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    API.get('/api/admin/users/stats').then(function (s) {
      document.getElementById('stat-total').textContent = (s && s.totalCustomers) || 0;
      document.getElementById('stat-active').textContent = (s && s.activeCustomers) || 0;
      document.getElementById('stat-blocked').textContent = (s && s.blockedCustomers) || 0;
      document.getElementById('stat-new').textContent = (s && s.newCustomersThisMonth) || 0;
    }).catch(function () {});
    loadUsers();
    document.getElementById('user-modal-close').addEventListener('click', function () {
      document.getElementById('userModal').classList.remove('active');
    });
    document.getElementById('userModal').addEventListener('click', function (e) {
      if (e.target === this) this.classList.remove('active');
    });
  });
})();
</script>
</body>
</html>
