<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Payment')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

    <main class="page">
        <div class="container container-narrow">
            <div id="payment-loading" class="flex-center" style="padding:3rem;">
                <span class="spinner"></span>
            </div>

            <div id="payment-error" style="display:none;">
                <div class="page-header">
                    <h1>Payment</h1>
                </div>
                <div class="panel text-center">
                    <p id="payment-error-msg">Unable to load payment details.</p>
                    <a href="/orders" class="btn btn-secondary mt-md">View Orders</a>
                </div>
            </div>

            <div id="payment-content" style="display:none;">
                <div class="page-header">
                    <h1>Payment</h1>
                    <p>Complete your payment to place the order</p>
                </div>

                <div class="panel">
                    <div class="panel-title">Payment Details</div>

                    <div class="form-section">
                        <div class="form-group">
                            <label for="cardNumber" class="form-label">Card Number</label>
                            <input type="text" id="cardNumber" class="form-input" placeholder="1234 5678 9012 3456"
                                   inputmode="numeric" autocomplete="cc-number">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry" class="form-label">Expiry Date</label>
                                <input type="text" id="expiry" class="form-input" placeholder="MM/YY" autocomplete="cc-exp">
                            </div>
                            <div class="form-group">
                                <label for="cvv" class="form-label">CVV</label>
                                <input type="text" id="cvv" class="form-input" placeholder="123" inputmode="numeric"
                                       autocomplete="cc-csc">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="cardName" class="form-label">Name on Card</label>
                            <input type="text" id="cardName" class="form-input" placeholder="John Doe"
                                   autocomplete="cc-name">
                        </div>
                    </div>

                    <div class="cart-summary-row total mb-lg">
                        <span>Total to Pay</span>
                        <span id="payment-amount">$0.00</span>
                    </div>

                    <button id="pay-now-btn" class="btn btn-primary btn-lg btn-block" data-payment-id="">Pay Now</button>
                    <button id="cancel-payment-btn" class="btn btn-danger btn-lg btn-block mt-md" style="display:none;" data-payment-id="">Cancel Payment</button>

                    <div id="verify-section" style="display:none;" class="mt-lg" style="border-top:1px solid var(--color-border);padding-top:1rem;">
                        <div class="panel-title">Verify Payment</div>
                        <p class="text-sm text-muted mb-md">Enter the transaction ID from your payment gateway to verify.</p>
                        <div class="form-group">
                            <label for="transaction-id" class="form-label">Transaction ID</label>
                            <input type="text" id="transaction-id" class="form-input" placeholder="Enter transaction ID">
                        </div>
                        <button id="verify-btn" class="btn btn-primary">Verify Payment</button>
                    </div>

                    <div class="text-center mt-md">
                        <a href="/orders" class="btn-link">Back to Orders</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
    <script>
    (function () {
      'use strict';
      function showPaymentError(msg) {
        document.getElementById('payment-loading').style.display = 'none';
        document.getElementById('payment-error').style.display = '';
        document.getElementById('payment-error-msg').textContent = msg || 'Unable to load payment details.';
      }
      function renderPayment(payment) {
        document.getElementById('payment-loading').style.display = 'none';
        document.getElementById('payment-content').style.display = '';
        document.getElementById('payment-amount').textContent = formatCurrency(payment.amount);
        document.getElementById('pay-now-btn').dataset.paymentId = payment.id;
        if (payment.status === 'PAID') {
          document.getElementById('pay-now-btn').textContent = 'Paid';
          document.getElementById('pay-now-btn').disabled = true;
          document.getElementById('pay-now-btn').className = 'btn btn-success btn-lg btn-block';
        } else if (payment.status !== 'PENDING' && payment.status !== 'FAILED') {
          document.getElementById('pay-now-btn').textContent = payment.status;
          document.getElementById('pay-now-btn').disabled = true;
          document.getElementById('pay-now-btn').className = 'btn btn-secondary btn-lg btn-block';
        }
        if (payment.status === 'PENDING' || payment.status === 'FAILED') {
          var cancelBtn = document.getElementById('cancel-payment-btn');
          cancelBtn.style.display = '';
          cancelBtn.dataset.paymentId = payment.id;
        }
        if (payment.status === 'PROCESSING') {
          document.getElementById('verify-section').style.display = '';
        }
      }
      document.addEventListener('DOMContentLoaded', function () {
        var paymentId = new URLSearchParams(window.location.search).get('paymentId');
        if (!paymentId) {
          showPaymentError('No payment ID specified.');
          return;
        }
        API.get('/user/payment/get/' + paymentId).then(renderPayment).catch(function (err) {
          showPaymentError(err.message || 'Failed to load payment details.');
        });
        document.getElementById('pay-now-btn').addEventListener('click', function () {
          var btn = this;
          var id = btn.dataset.paymentId;
          if (!id) return;
          setButtonLoading(btn, true);
          API.post('/user/payment/pay/' + id, {}).then(function () {
            showToast('Payment successful!', 'success');
            btn.textContent = 'Paid';
            btn.disabled = true;
            btn.className = 'btn btn-success btn-lg btn-block';
            document.getElementById('cancel-payment-btn').style.display = 'none';
          }).catch(function (err) {
            showToast(err.message || 'Payment failed', 'error');
            setButtonLoading(btn, false);
          });
        });
        document.getElementById('cancel-payment-btn').addEventListener('click', function () {
          var btn = this;
          var id = btn.dataset.paymentId;
          if (!id) return;
          showConfirmModal({ title: 'Cancel Payment', message: 'Cancel this payment?', confirmText: 'Cancel Payment', danger: true }).then(function (confirmed) {
            if (!confirmed) return;
            setButtonLoading(btn, true);
            API.put('/user/payment/cancel/' + id, {}).then(function () {
              showToast('Payment cancelled', 'success');
              window.location.href = '/orders';
            }).catch(function (err) {
              showToast(err.message || 'Failed to cancel', 'error');
              setButtonLoading(btn, false);
            });
          });
        });
        document.getElementById('verify-btn').addEventListener('click', function () {
          var btn = this;
          var txId = document.getElementById('transaction-id').value.trim();
          if (!txId) { showToast('Enter transaction ID', 'error'); return; }
          setButtonLoading(btn, true);
          API.post('/user/payment/verify', { transactionId: txId }).then(function () {
            showToast('Payment verified!', 'success');
            document.getElementById('verify-section').style.display = 'none';
            document.getElementById('pay-now-btn').textContent = 'Paid';
            document.getElementById('pay-now-btn').disabled = true;
            document.getElementById('pay-now-btn').className = 'btn btn-success btn-lg btn-block';
            document.getElementById('cancel-payment-btn').style.display = 'none';
          }).catch(function (err) {
            showToast(err.message || 'Verification failed', 'error');
            setButtonLoading(btn, false);
          });
        });
      });
    })();
    </script>
</body>
</html>
