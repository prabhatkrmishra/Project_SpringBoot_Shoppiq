<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Inventory Management')}"></head>
<body>
<th:block th:replace="~{fragments/admin-header :: admin-header('inventory')}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="admin-main">
  <div class="page-header flex-between items-center">
    <div>
      <h1>Inventory Management</h1>
      <p>Manage product stock and availability</p>
    </div>
    <a href="/admin/products" class="btn btn-primary btn-sm">Bulk Import</a>
  </div>

  <div class="admin-summary-grid">
    <div class="summary-card"><div class="label">Total Products</div><div class="value" id="stat-total">0</div></div>
    <div class="summary-card"><div class="label">In Stock</div><div class="value success" id="stat-in-stock">0</div></div>
    <div class="summary-card"><div class="label">Low Stock</div><div class="value warning" id="stat-low-stock">0</div></div>
    <div class="summary-card"><div class="label">Out of Stock</div><div class="value danger" id="stat-out-of-stock">0</div></div>
  </div>

  <div class="admin-filters">
    <select id="stockFilter">
      <option value="">All Status</option>
      <option value="IN_STOCK">In Stock</option>
      <option value="LOW_STOCK">Low Stock</option>
      <option value="OUT_OF_STOCK">Out of Stock</option>
    </select>
  </div>

  <div class="admin-panel">
    <div class="table-responsive">
      <table class="admin-table">
        <thead>
          <tr>
            <th><input type="checkbox" id="selectAll" aria-label="Select all"></th>
            <th>Product</th>
            <th>SKU</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventory-body">
          <tr><td colspan="7" class="text-center text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="inventory-pagination"></div>

  <div id="bulkActionBar" class="bulk-action-bar" style="display:none;">
    <span id="selectedCount">0</span> items selected
    <div class="bulk-action-bar-controls">
      <input type="number" id="bulkStockQty" min="0" placeholder="New stock qty" style="width:120px;">
      <input type="text" id="bulkReason" placeholder="Reason" style="width:200px;" value="Admin bulk adjustment">
      <button class="btn btn-sm btn-primary" id="bulkUpdateBtn">Update Selected</button>
      <button class="btn btn-sm btn-ghost" id="bulkClearBtn">Clear</button>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<style>
.bulk-action-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--color-surface, #1a1a2e); border-top: 1px solid var(--color-border, #333);
  padding: 12px 24px; display: flex; align-items: center; gap: 16px;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.3); font-size: 0.9rem;
}
.bulk-action-bar-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
</style>
<script th:src="@{/js/pagination.js}"></script>
<script src="/js/sanitize.js"></script>
<script>
(function () {
  'use strict';
  var allItems = [];
  var currentPage = 0;
  var PAGE_SIZE = 20;

  function stockBadge(status) {
    if (status === 'IN_STOCK') return '<span class="status-badge in-stock">In Stock</span>';
    if (status === 'LOW_STOCK') return '<span class="status-badge low-stock">Low Stock</span>';
    return '<span class="status-badge out-of-stock">Out of Stock</span>';
  }

  function getSelectedIds() {
    var ids = [];
    document.querySelectorAll('.item-checkbox:checked').forEach(function (cb) {
      ids.push(cb.dataset.itemId);
    });
    return ids;
  }

  function updateBulkBar() {
    var count = getSelectedIds().length;
    document.getElementById('selectedCount').textContent = count;
    document.getElementById('bulkActionBar').style.display = count > 0 ? '' : 'none';
    var selectAll = document.getElementById('selectAll');
    var allCheckboxes = document.querySelectorAll('.item-checkbox');
    selectAll.checked = allCheckboxes.length > 0 && allCheckboxes.length === count;
  }

  function renderRows(items) {
    var tbody = document.getElementById('inventory-body');
    if (!items || items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No products found</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    items.forEach(function (item) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td><input type="checkbox" class="item-checkbox" data-item-id="' + item.itemId + '" aria-label="Select"></td>' +
        '<td><a href="/item/' + item.itemId + '" class="btn-link">' + escapeHtml(item.itemName || '') + '</a></td>' +
        '<td class="text-sm text-muted">' + escapeHtml(item.sku || '') + '</td>' +
        '<td>' + formatCurrency(item.effectivePrice || item.basePrice) + '</td>' +
        '<td>' +
          '<div class="inline-edit">' +
            '<input type="number" class="stock-input" value="' + item.stockQuantity + '" min="0" data-item-id="' + item.itemId + '">' +
            '<button class="stock-adjust-btn btn btn-sm btn-primary" data-item-id="' + item.itemId + '">Update</button>' +
          '</div>' +
        '</td>' +
        '<td>' + stockBadge(item.stockStatus) + '</td>' +
        '<td class="admin-table-actions">' +
          '<a href="/item/' + item.itemId + '" class="btn btn-sm btn-ghost" aria-label="View"><i data-lucide="eye" class="icon-sm"></i></a>' +
        '</td>';
      tbody.appendChild(tr);
    });
    initIcons();

    tbody.querySelectorAll('.item-checkbox').forEach(function (cb) {
      cb.addEventListener('change', updateBulkBar);
    });
    tbody.querySelectorAll('.stock-adjust-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var itemId = this.dataset.itemId;
        var input = tbody.querySelector('.stock-input[data-item-id="' + itemId + '"]');
        var newQty = parseInt(input.value) || 0;
        API.put('/api/admin/inventory/' + itemId, { quantity: newQty, reason: 'Admin adjustment' }).then(function () {
          showToast('Stock updated', 'success');
          loadInventory();
        }).catch(function (e) { showToast(e.message, 'error'); });
      });
    });
    updateBulkBar();
  }

  function renderInventory(items) {
    allItems = items || [];
    var inStock = allItems.filter(function (i) { return i.stockStatus === 'IN_STOCK'; }).length;
    var lowStock = allItems.filter(function (i) { return i.stockStatus === 'LOW_STOCK'; }).length;
    var outOfStock = allItems.filter(function (i) { return i.stockStatus === 'OUT_OF_STOCK'; }).length;
    document.getElementById('stat-total').textContent = allItems.length;
    document.getElementById('stat-in-stock').textContent = inStock;
    document.getElementById('stat-low-stock').textContent = lowStock;
    document.getElementById('stat-out-of-stock').textContent = outOfStock;
    renderRows(allItems);
  }

  function loadFiltered(page) {
    if (page != null) currentPage = page;
    var filter = document.getElementById('stockFilter').value;
    var url = '/api/admin/inventory';
    if (filter === 'LOW_STOCK') url = '/api/admin/inventory/low-stock';
    else if (filter === 'OUT_OF_STOCK') url = '/api/admin/inventory/out-of-stock';
    url += '?page=' + currentPage + '&size=' + PAGE_SIZE;
    API.get(url).then(function (data) {
      var items = data && data.content ? data.content : [];
      renderRows(items);
      Pagination.render('inventory-pagination', data, loadFiltered, {
        onPageSizeChange: function (newSize) {
          PAGE_SIZE = newSize;
          loadFiltered(0);
        }
      });
    }).catch(function () {
      document.getElementById('inventory-body').innerHTML =
        '<tr><td colspan="7" class="text-center text-muted">Failed to load inventory</td></tr>';
    });
  }

  function loadInventory(page) {
    if (page != null) currentPage = page;
    API.get('/api/admin/inventory?page=' + currentPage + '&size=' + PAGE_SIZE).then(function (data) {
      var items = data && data.content ? data.content : [];
      renderInventory(items);
      Pagination.render('inventory-pagination', data, loadInventory, {
        onPageSizeChange: function (newSize) {
          PAGE_SIZE = newSize;
          loadInventory(0);
        }
      });
    }).catch(function () {
      document.getElementById('inventory-body').innerHTML =
        '<tr><td colspan="7" class="text-center text-muted">Failed to load inventory</td></tr>';
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    loadInventory();
    document.getElementById('stockFilter').addEventListener('change', function () {
      loadFiltered(0);
    });
    document.getElementById('selectAll').addEventListener('change', function () {
      var checked = this.checked;
      document.querySelectorAll('.item-checkbox').forEach(function (cb) { cb.checked = checked; });
      updateBulkBar();
    });
    document.getElementById('bulkUpdateBtn').addEventListener('click', function () {
      var ids = getSelectedIds();
      if (ids.length === 0) return;
      var qty = parseInt(document.getElementById('bulkStockQty').value);
      if (isNaN(qty) || qty < 0) { showToast('Enter a valid stock quantity', 'error'); return; }
      var reason = document.getElementById('bulkReason').value.trim() || 'Admin bulk adjustment';
      var adjustments = {};
      ids.forEach(function (id) { adjustments[id] = { quantity: qty, reason: reason }; });
      API.post('/api/admin/inventory/bulk-adjust', adjustments).then(function () {
        showToast(ids.length + ' items updated', 'success');
        document.querySelectorAll('.item-checkbox').forEach(function (cb) { cb.checked = false; });
        document.getElementById('selectAll').checked = false;
        updateBulkBar();
        loadInventory();
      }).catch(function (e) { showToast(e.message, 'error'); });
    });
    document.getElementById('bulkClearBtn').addEventListener('click', function () {
      document.querySelectorAll('.item-checkbox').forEach(function (cb) { cb.checked = false; });
      document.getElementById('selectAll').checked = false;
      updateBulkBar();
    });
  });
})();
</script>
</body>
</html>
