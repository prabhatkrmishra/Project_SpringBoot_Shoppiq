# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > src/main/resources/keystore.p12
            echo "Keystore restored"
          else
            echo "No KEYSTORE_BASE64 secret — skipping"
          fi

      - name: Build with Maven
        env:
          MAVEN_OPTS: "-Xmx2048m -XX:+UseG1GC -XX:+UseStringDeduplication"
        run: mvn -B clean package --file pom.xml

      # Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
      # Skipped on PRs — fork PRs cannot write to the dependency graph (403)
      - name: Update dependency graph
        if: github.event_name == 'push'
        uses: advanced-security/maven-dependency-submission-action@v4
        with:
          ignore-maven-wrapper: true
