kind: Application

spring:
  application:
    name: shoppiq
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # update -> validate
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  web:
    error:
      include-message: always
      include-binding-errors: always
      include-stacktrace: never
jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000
  short-expiration: 1800000

app:
  security:
    secure-cookie: false
  pagination:
    default-page-size: 20
    max-page-size: 100
    admin-page-size: 20
    seller-page-size: 15
    catalog-page-size: 12

# Logging configuration
# Available levels (create most to least verbose):
#   TRACE - Everything including framework internals
#   DEBUG - Debug messages, Info, Warn, Error
#   INFO  - Informational messages, Warn, Error
#   WARN  - Warnings and Errors only
#   ERROR - Errors only
#   OFF   - Disable all logging
logging:
  level:
    com.pkmprojects.shoppiq: TRACE

server:
  port: 8090

# ============================================================
# Payment & email gateway integrations
# ============================================================
shoppiq:
  email:
    provider: ${EMAIL_PROVIDER:console}
    from: ${EMAIL_FROM:noreply@shoppiq.com}
    enabled: ${EMAIL_ENABLED:true}
    smtp:
      host: ${SMTP_HOST:smtp.gmail.com}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME}
      password: ${SMTP_PASSWORD}
      protocol: smtp
      auth: true
      starttls:
        enable: true
  payment:
    gateways:
      razorpay:
        base-url: https://api.razorpay.com/v1
        api-key: ${RAZORPAY_KEY_ID:rzp_test_dummy}
        api-secret: ${RAZORPAY_KEY_SECRET:rzp_test_secret}
        enabled: true
      stripe:
        base-url: https://api.stripe.com/v1
        api-key: ${STRIPE_SECRET_KEY:sk_test_dummy}
        enabled: true
      paypal:
        base-url: https://api-m.sandbox.paypal.com
        api-key: ${PAYPAL_CLIENT_ID:paypal_client_dummy}
        api-secret: ${PAYPAL_CLIENT_SECRET:paypal_secret_dummy}
        enabled: true
      upi:
        base-url: ${UPI_BASE_URL:https://upi.psp.example/v1}
        api-key: ${UPI_MERCHANT_KEY:upi_merchant_dummy}
        merchant-vpa: ${UPI_MERCHANT_VPA:shoppiq@bank}
        enabled: false
