<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Category')}"></head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="page">
  <div class="container">
    <div id="loadingState" class="text-center" style="padding:48px 0;">
      <div class="spinner"></div>
      <p class="text-muted mt-md">Loading products...</p>
    </div>

    <div id="errorState" class="empty-state" style="display:none;">
      <div class="empty-state-icon"><i data-lucide="layout-grid" class="icon-xl"></i></div>
      <h2>Category Not Found</h2>
      <p>The category you're looking for doesn't exist.</p>
      <a th:href="@{/categories}" class="btn btn-primary">Browse Categories</a>
    </div>

    <div id="categoryContent" style="display:none;">
      <nav class="breadcrumbs" aria-label="Breadcrumb" id="breadcrumbs"></nav>
      <div class="page-header">
        <h1 id="categoryName"></h1>
        <p id="categoryDesc"></p>
        <p id="itemCount"></p>
      </div>

      <div id="emptyItems" class="empty-state" style="display:none;">
        <div class="empty-state-icon"><i data-lucide="package-x" class="icon-xl"></i></div>
        <h2>No Products Found</h2>
        <p>There are no products in this category yet.</p>
        <a th:href="@{/allitems}" class="btn btn-primary">Browse All Products</a>
      </div>

      <div id="itemGrid" class="grid-4" style="display:none;"></div>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-js}"></th:block>

<script>
document.addEventListener("DOMContentLoaded", function () {
  var slug = window.location.pathname.split("/").pop();
  loadCategory(slug);
});

async function loadCategory(slug) {
  var loading = document.getElementById("loadingState");
  var error = document.getElementById("errorState");
  var content = document.getElementById("categoryContent");

  try {
    var category = await API.get("/categories/slug/" + slug);
    document.title = escapeHtml(category.name) + " — Shoppiq";

    document.getElementById("breadcrumbs").innerHTML =
      '<a href="/">Home</a><span class="separator"><i data-lucide="chevron-right" class="icon-sm"></i></span>' +
      '<a href="/categories">Categories</a><span class="separator"><i data-lucide="chevron-right" class="icon-sm"></i></span>' +
      '<span class="current">' + escapeHtml(category.name) + '</span>';
    document.getElementById("categoryName").textContent = category.name;
    if (category.description) document.getElementById("categoryDesc").textContent = category.description;

    var allItems = await API.get("/items/all");
    var items = allItems.filter(function (item) {
      return item.category && item.category.slug === slug;
    });

    document.getElementById("itemCount").textContent = items.length + " products in this category";

    if (items.length === 0) {
      document.getElementById("emptyItems").style.display = "";
    } else {
      document.getElementById("itemGrid").innerHTML = items.map(function (item) {
        var stockClass = item.stockQuantity > 10 ? "badge-success" : (item.stockQuantity > 0 ? "badge-warning" : "badge-danger");
        var stockText = item.stockQuantity > 0 ? "In Stock" : "Out of Stock";
        return '<a href="/item/' + item.id + '" class="card-link"><article class="card product-card">' +
          '<div class="card-image-wrapper">' +
            '<img class="card-image" src="' + (item.imageUrl || 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=300&fit=crop') + '" alt="' + escapeAttr(item.name) + '" loading="lazy" width="300" height="300">' +
          '</div>' +
          '<div class="card-body">' +
            '<h3 class="card-title">' + escapeHtml(item.name) + '</h3>' +
            '<p class="card-text">' + escapeHtml(item.description || '') + '</p>' +
            '<div class="card-price"><span>$' + escapeHtml(String(item.price)) + '</span></div>' +
            '<div class="card-meta"><span class="badge ' + stockClass + '">' + stockText + '</span></div>' +
          '</div>' +
        '</article></a>';
      }).join("");
      document.getElementById("itemGrid").style.display = "";
    }

    content.style.display = "";
  } catch (e) {
    error.style.display = "";
  } finally {
    loading.style.display = "none";
  }
  if (typeof lucide !== "undefined") lucide.createIcons();
}

function escapeHtml(str) { var d = document.createElement("div"); d.appendChild(document.createTextNode(str || "")); return d.innerHTML; }
function escapeAttr(str) { return (str || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
</script>
</body>
</html>
