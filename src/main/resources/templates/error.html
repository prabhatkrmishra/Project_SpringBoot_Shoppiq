<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Error')}"></head>
<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>

    <main class="page">
        <div class="container container-narrow text-center">
            <div class="panel" style="padding: 3rem 2rem;">
                <div style="margin-bottom: 1.5rem;">
                    <i data-lucide="alert-triangle" style="width:64px;height:64px;color:var(--color-danger);"></i>
                </div>

                <h1 style="font-size: 3rem; font-weight: 700; color: var(--color-text); margin-bottom: 0.5rem;"
                    th:text="${status != null ? status : 'Error'}">Error</h1>

                <p style="font-size: 1.1rem; color: var(--color-text-secondary); margin-bottom: 0.5rem;"
                   th:if="${error != null}" th:text="${error}">An unexpected error occurred.</p>

                <p style="font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 2rem;"
                   th:if="${errorCode != null}">
                    Error code: <code th:text="${errorCode}">UNKNOWN</code>
                </p>

                <div style="display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap;">
                    <a th:href="@{/}" class="btn btn-primary">
                        <i data-lucide="home" class="icon-sm"></i> Go Home
                    </a>
                    <button onclick="history.back()" class="btn btn-secondary">
                        <i data-lucide="arrow-left" class="icon-sm"></i> Go Back
                    </button>
                </div>

                <div th:if="${status != null && (status == 403 || status == 401)}"
                     style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--color-border);">
                    <p style="font-size: 0.85rem; color: var(--color-text-muted);">
                        <span th:if="${status == 401}">Please <a th:href="@{/login}" class="btn-link">sign in</a> to access this page.</span>
                        <span th:if="${status == 403}">You don't have permission to access this page.</span>
                    </p>
                </div>

                <div th:if="${status != null && status == 404}"
                     style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--color-border);">
                    <p style="font-size: 0.85rem; color: var(--color-text-muted);">
                        The page you're looking for doesn't exist or has been moved.
                    </p>
                </div>

                <div th:if="${status != null && status >= 500}"
                     style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--color-border);">
                    <p style="font-size: 0.85rem; color: var(--color-text-muted);">
                        Something went wrong on our end. Please try again later.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>
</body>
</html>
