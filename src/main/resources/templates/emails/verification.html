<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background-color: #f4f4f4;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4; padding: 20px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0"
                       style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #4f46e5; padding: 30px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Shoppiq</h1>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 40px 30px;">
                            <h2 style="color: #1e293b; margin: 0 0 20px 0;">Verify Your Email Address</h2>

                            <p style="color: #475569; line-height: 1.6; margin: 0 0 20px 0;">
                                Hello <strong th:text="${userName}">User</strong>,
                            </p>

                            <p style="color: #475569; line-height: 1.6; margin: 0 0 20px 0;">
                                Thank you for registering with Shoppiq. Please use the following code to verify your
                                email address:
                            </p>

                            <!-- Verification Code -->
                            <table width="100%" cellpadding="0" cellspacing="0" style="margin: 20px 0;">
                                <tr>
                                    <td align="center">
                                        <div style="background-color: #f1f5f9; border-radius: 8px; padding: 20px 40px; display: inline-block;">
                                            <span th:text="${verificationCode}"
                                                  style="font-size: 32px; font-weight: bold; color: #4f46e5; letter-spacing: 5px;">123456</span>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <p style="color: #94a3b8; font-size: 14px; text-align: center; margin: 20px 0;">
                                This code expires in <strong>10 minutes</strong>.
                            </p>

                            <p style="color: #475569; line-height: 1.6; margin: 20px 0 0 0;">
                                If you didn't create an account, please ignore this email.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8fafc; padding: 20px 30px; text-align: center; border-top: 1px solid #e2e8f0;">
                            <p style="color: #94a3b8; font-size: 12px; margin: 0;">
                                This is a transactional email from Shoppiq.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
