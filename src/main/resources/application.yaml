kind: Application

spring:
  application:
    name: shoppiq
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # update -> validate
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  web:
    error:
      include-message: always           # Production recommendation: never
      include-binding-errors: always    # Production recommendation: never
      include-stacktrace: never
jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000
  short-expiration: 1800000
  refresh-max-age: 2592000000

app:
  security:
    secure-cookie: false    # Production recommendation: true
  pagination:
    default-page-size: 20
    max-page-size: 100
    admin-page-size: 20
    seller-page-size: 15
    catalog-page-size: 12
  cors:
    enabled: false                              # Recommendation: true for separate-frontend / microservice deployments
    allowed-origins: http://localhost:3000       # Comma-separated; supports patterns like https://*.example.com
    allowed-methods: GET, POST, PUT, DELETE, PATCH, OPTIONS
    allowed-headers: Authorization, Content-Type, X-Requested-With, Accept, Origin, Cache-Control, X-Request-Id
    exposed-headers: X-Request-Id
    allow-credentials: true
    max-age: 3600
  rate-limit:
    enabled: true
    rules:
      # Unauthenticated : IP-based
      - path: /auth/login
        limit: 10
        duration: 900
        key-type: IP
      - path: /user/register
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/forgot-password
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/reset-password
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/verify-email
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/confirm-email
        limit: 10
        duration: 3600
        key-type: IP
      - path: /auth/refresh
        limit: 10
        duration: 900
        key-type: IP
      - path: /auth/google/complete-profile
        limit: 10
        duration: 3600
        key-type: IP
      - path: /contact
        limit: 10
        duration: 3600
        key-type: IP
      - path: /api/newsletter/subscribe
        limit: 10
        duration: 3600
        key-type: IP
      # Authenticated critical : userId:IP-based
      - path: /user/order/checkout
        limit: 10
        duration: 60
        key-type: USER_IP
      - path: /user/payment/pay/*
        limit: 10
        duration: 60
        key-type: USER_IP
      - path: /user/payment/verify
        limit: 10
        duration: 60
        key-type: USER_IP
      - path: /user/password
        limit: 10
        duration: 60
        key-type: USER_IP

# Logging configuration
# Available levels (create most to least verbose):
#   TRACE - Everything including framework internals
#   DEBUG - Debug messages, Info, Warn, Error
#   INFO  - Informational messages, Warn, Error
#   WARN  - Warnings and Errors only
#   ERROR - Errors only
#   OFF   - Disable all logging
logging:
  level:
    com.pkmprojects.shoppiq: TRACE    # Production recommendation: WARN or ERROR

server:
  port: 8090

# ============================================================
# Payment & email gateway integrations
# ============================================================
shoppiq:
  email:
    provider: ${EMAIL_PROVIDER:console}    # Production recommendation: smtp
    from: ${EMAIL_FROM:noreply@shoppiq.com}
    enabled: ${EMAIL_ENABLED:true}
    smtp:
      host: ${SMTP_HOST:smtp.gmail.com}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME}
      password: ${SMTP_PASSWORD}
      protocol: smtp
      auth: true
      starttls:
        enable: true
  payment:
    gateways:
      razorpay:
        base-url: https://api.razorpay.com/v1
        api-key: ${RAZORPAY_KEY_ID:rzp_test_dummy}           # Production recommendation: use live key
        api-secret: ${RAZORPAY_KEY_SECRET:rzp_test_secret}   # Production recommendation: use live secret
        enabled: true
      stripe:
        base-url: https://api.stripe.com/v1
        api-key: ${STRIPE_SECRET_KEY:sk_test_dummy}           # Production recommendation: use live key
        enabled: true
      paypal:
        base-url: https://api-m.sandbox.paypal.com            # Production recommendation: https://api-m.paypal.com
        api-key: ${PAYPAL_CLIENT_ID:paypal_client_dummy}      # Production recommendation: use live client ID
        api-secret: ${PAYPAL_CLIENT_SECRET:paypal_secret_dummy}  # Production recommendation: use live secret
        enabled: true
      upi:
        base-url: ${UPI_BASE_URL:https://upi.psp.example/v1}
        api-key: ${UPI_MERCHANT_KEY:upi_merchant_dummy}
        merchant-vpa: ${UPI_MERCHANT_VPA:shoppiq@bank}
        enabled: false
