<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment — Shoppiq</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Georgia', serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

        .header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 40px; height: 56px;
            display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif; color: #111; }
        .header-nav { display: flex; gap: 12px; }
        .nav-link { font-family: 'Segoe UI', sans-serif; font-size: 0.78rem; letter-spacing: 0.06em;
            text-transform: uppercase; color: #555; text-decoration: none; padding: 6px 16px; border-radius: 3px; }
        .nav-link:hover { color: #111; }

        .page { max-width: 680px; margin: 40px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 22px; }

        .back-link { font-family: 'Segoe UI', sans-serif; font-size: 0.82rem; color: #555;
            text-decoration: none; }
        .back-link:hover { color: #111; }

        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 28px 32px; }
        .card-title { font-family: 'Segoe UI', sans-serif; font-size: 0.78rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 18px;
            padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }

        /* Status badge */
        .status-badge { display: inline-block; padding: 5px 14px; border-radius: 20px;
            font-family: 'Segoe UI', sans-serif; font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase; }
        .badge-PENDING    { background: #fff3e0; color: #e65100; }
        .badge-PROCESSING { background: #e3f2fd; color: #1565c0; }
        .badge-PAID       { background: #e8f5e9; color: #1b5e20; }
        .badge-FAILED     { background: #fce4ec; color: #b71c1c; }
        .badge-CANCELLED  { background: #f5f5f5; color: #616161; }
        .badge-REFUNDED   { background: #f3e5f5; color: #6a1b9a; }

        /* Detail rows */
        .detail-row { display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #f8f8f8; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-family: 'Segoe UI', sans-serif; font-size: 0.82rem; color: #777; }
        .detail-value { font-family: 'Segoe UI', sans-serif; font-size: 0.88rem; color: #111; font-weight: 500; }

        /* Order summary */
        .order-line { display: flex; justify-content: space-between; padding: 8px 0;
            border-bottom: 1px solid #f8f8f8; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .order-line:last-child { border-bottom: none; }
        .grand-total { display: flex; justify-content: space-between; padding: 14px 0 0;
            font-family: 'Segoe UI', sans-serif; font-size: 1rem; font-weight: 700; color: #111; }

        /* COD message */
        .cod-notice { background: #f0f7ff; border: 1px solid #c8dff8; border-radius: 4px;
            padding: 16px 20px; font-family: 'Segoe UI', sans-serif; font-size: 0.88rem;
            color: #1a4f8a; line-height: 1.6; }

        /* Actions */
        .actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 11px 24px; border-radius: 3px; font-family: 'Segoe UI', sans-serif;
            font-size: 0.82rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
            cursor: pointer; border: none; transition: background 0.15s; }
        .btn-primary   { background: #111; color: #fff; }
        .btn-primary:hover   { background: #333; }
        .btn-secondary { background: #fff; color: #111; border: 1px solid #ccc; }
        .btn-secondary:hover { background: #f5f5f5; }
        .btn-danger    { background: #fff; color: #c0392b; border: 1px solid #c0392b; }
        .btn-danger:hover    { background: #fce4ec; }
        .btn:disabled  { opacity: 0.5; cursor: not-allowed; }

        /* Verify form */
        .verify-section { margin-top: 16px; }
        .verify-label { font-family: 'Segoe UI', sans-serif; font-size: 0.78rem; font-weight: 700;
            letter-spacing: 0.07em; text-transform: uppercase; color: #555; margin-bottom: 8px; display: block; }
        .verify-input { width: 100%; border: 1px solid #ddd; border-radius: 3px; padding: 10px 14px;
            font-family: 'Segoe UI', sans-serif; font-size: 0.88rem; color: #111; outline: none; }
        .verify-input:focus { border-color: #111; }

        .toast { position: fixed; bottom: 24px; right: 24px; background: #111; color: #fff;
            padding: 12px 20px; border-radius: 4px; font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem; display: none; z-index: 100; }
        .toast.error { background: #c0392b; }
        .toast.show { display: block; }

        .loading { text-align: center; padding: 48px; font-family: 'Segoe UI', sans-serif;
            color: #888; font-size: 0.88rem; }
    </style>
</head>
<body>

<header class="header">
    <h1>Shoppiq</h1>
    <nav class="header-nav">
        <a href="/orders" class="nav-link">My Orders</a>
        <a href="/allitems" class="nav-link">Shop</a>
    </nav>
</header>

<main class="page">
    <a href="/orders" class="back-link">← Back to Orders</a>
    <div id="content"><div class="loading">Loading payment…</div></div>
</main>

<div class="toast" id="toast"></div>

<script>
    const paymentId = new URLSearchParams(location.search).get('paymentId');

    (async function load() {
        if (!paymentId) { renderError('No payment ID provided.'); return; }
        try {
            const res = await fetch(`/user/payment/get/${paymentId}`);
            if (!res.ok) { renderError('Payment not found.'); return; }
            render(await res.json());
        } catch {
            renderError('Unable to load payment.');
        }
    })();

    function render(p) {
        const isCod    = p.paymentMethod === 'COD';
        const isPaid   = p.status === 'PAID';
        const isFailed = p.status === 'FAILED';
        const isPending = p.status === 'PENDING';
        const canPay   = isPending || isFailed;
        const canCancel = isPending || isFailed;
        const canVerify = p.status === 'PROCESSING';

        document.getElementById('content').innerHTML = `

            <!-- Payment Status -->
            <div class="card">
                <div class="card-title">Payment</div>
                <div class="detail-row">
                    <span class="detail-label">Reference</span>
                    <span class="detail-value">${esc(p.paymentReference)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="status-badge badge-${p.status}">${p.status}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Method</span>
                    <span class="detail-value">${p.paymentMethod}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Amount</span>
                    <span class="detail-value">₹${num(p.amount)} ${esc(p.currency)}</span>
                </div>
                ${p.transactionId ? `
                <div class="detail-row">
                    <span class="detail-label">Transaction ID</span>
                    <span class="detail-value">${esc(p.transactionId)}</span>
                </div>` : ''}
                ${p.paidAt ? `
                <div class="detail-row">
                    <span class="detail-label">Paid At</span>
                    <span class="detail-value">${fmt(p.paidAt)}</span>
                </div>` : ''}
            </div>

            <!-- COD notice OR online actions -->
            ${isCod ? `
            <div class="cod-notice">
                <strong>Cash on Delivery</strong><br>
                Your order will be paid when it arrives at your doorstep.
                No online payment is required at this time.
            </div>
            ` : `
            <!-- Online payment actions -->
            <div class="card">
                <div class="card-title">Payment Actions</div>

                <div class="actions" id="actionButtons">
                    ${canPay ? `<button class="btn btn-primary" onclick="initiatePay()">
                        ${isFailed ? 'Retry Payment' : 'Pay Now'}
                    </button>` : ''}
                    ${canCancel ? `<button class="btn btn-danger" onclick="doCancel()">Cancel Payment</button>` : ''}
                    ${isPaid ? `<span style="font-family:'Segoe UI',sans-serif;font-size:.88rem;color:#2e7d32;font-weight:600;">✓ Payment Successful</span>` : ''}
                </div>

                ${canVerify ? `
                <div class="verify-section">
                    <label class="verify-label">Enter Transaction ID to Verify</label>
                    <input class="verify-input" id="txInput" type="text" placeholder="TXN-XXXXXXXXXX">
                    <div class="actions" style="margin-top:12px;">
                        <button class="btn btn-primary" onclick="doVerify()">Verify Payment</button>
                    </div>
                </div>` : ''}
            </div>
            `}

            <!-- Order summary -->
            <div class="card">
                <div class="card-title">Order #${p.orderId}</div>
                <a href="/order-detail?id=${p.orderId}"
                   style="font-family:'Segoe UI',sans-serif;font-size:.82rem;color:#555;text-decoration:underline;">
                    View order details →
                </a>
            </div>
        `;
    }

    // ── Actions ────────────────────────────────────────────────────────────

    async function initiatePay() {
        const res = await apiCall(`/user/payment/pay/${paymentId}`, 'POST');
        if (res) { showToast('Payment initiated!'); setTimeout(() => location.reload(), 1200); }
    }

    async function doVerify() {
        const txId = document.getElementById('txInput')?.value?.trim();
        if (!txId) { showToast('Please enter a transaction ID.', true); return; }
        const res = await apiCall('/user/payment/verify', 'POST', { transactionId: txId });
        if (res) { showToast('Payment verified!'); setTimeout(() => location.reload(), 1200); }
    }

    async function doCancel() {
        if (!confirm('Cancel this payment?')) return;
        const res = await apiCall(`/user/payment/cancel/${paymentId}`, 'PUT');
        if (res) { showToast('Payment cancelled.'); setTimeout(() => location.reload(), 1200); }
    }

    async function apiCall(url, method, body) {
        try {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            if (res.ok) return await res.json();
            const err = await res.json().catch(() => ({}));
            showToast(err.detail || 'Operation failed.', true);
        } catch {
            showToast('Network error.', true);
        }
        return null;
    }

    // ── Helpers ────────────────────────────────────────────────────────────

    function renderError(msg) {
        document.getElementById('content').innerHTML =
            `<div class="loading">${msg}</div>`;
    }

    function fmt(iso) {
        return iso ? new Date(iso).toLocaleString('en-IN', {
            day:'numeric', month:'short', year:'numeric',
            hour:'2-digit', minute:'2-digit'
        }) : '';
    }

    function num(v) { return Number(v || 0).toFixed(2); }

    function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg, error = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className   = 'toast show' + (error ? ' error' : '');
        setTimeout(() => t.classList.remove('show'), 3500);
    }
</script>
</body>
</html>
