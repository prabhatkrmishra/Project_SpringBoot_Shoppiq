<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Pending Products')}"></head>
<body>
<th:block th:replace="~{fragments/admin-header :: admin-header('pending')}"></th:block>
<th:block th:replace="~{fragments/alerts :: toast-container}"></th:block>

<main class="admin-main">
  <div class="page-header">
    <h1>Pending Products</h1>
    <p>Review and approve new product listings</p>
  </div>

  <div class="admin-panel">
    <div class="admin-panel-title">Awaiting Approval</div>
    <div class="table-responsive">
      <table class="admin-table">
        <thead>
          <tr><th>ID</th><th>Product</th><th>SKU</th><th>Brand</th><th>Price</th><th>Stock</th><th>Category</th><th>Actions</th></tr>
        </thead>
        <tbody id="pending-body">
          <tr><td colspan="8" class="text-center text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>
<script>
(function () {
  'use strict';
  function renderProducts(products) {
    var tbody = document.getElementById('pending-body');
    if (!products || products.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No pending products</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    products.forEach(function (p) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + p.itemId + '</td>' +
        '<td><strong>' + (p.itemName || '') + '</strong><br><span class="text-sm text-muted">' + (p.description || '').substring(0, 60) + '</span></td>' +
        '<td class="text-sm"><code>' + (p.sku || '') + '</code></td>' +
        '<td>' + (p.brand || '') + '</td>' +
        '<td>' + formatCurrency(p.effectivePrice || p.basePrice) + '</td>' +
        '<td>' + p.stockQuantity + '</td>' +
        '<td class="text-sm">' + (p.categoryName || '') + '</td>' +
        '<td>' +
          '<button class="btn btn-sm btn-success publish-btn" data-id="' + p.itemId + '">Publish</button> ' +
          '<button class="btn btn-sm btn-danger reject-btn" data-id="' + p.itemId + '">Reject</button>' +
        '</td>';
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('.publish-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = this.dataset.id;
        API.put('/api/admin/products/' + id + '/publish', {}).then(function () {
          showToast('Product published', 'success');
          loadProducts();
        }).catch(function (e) { showToast(e.message, 'error'); });
      });
    });
    tbody.querySelectorAll('.reject-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var id = this.dataset.id;
        showConfirmModal({ title: 'Reject Product', message: 'Reject this product?', confirmText: 'Reject', danger: true }).then(function (confirmed) {
          if (!confirmed) return;
          API.put('/api/admin/products/' + id + '/reject', {}).then(function () {
            showToast('Product rejected', 'success');
            loadProducts();
          }).catch(function (e) { showToast(e.message, 'error'); });
        });
      });
    });
  }
  function loadProducts() {
    API.get('/api/admin/products/pending').then(renderProducts).catch(function () {
      document.getElementById('pending-body').innerHTML =
        '<tr><td colspan="8" class="text-center text-muted">Failed to load</td></tr>';
    });
  }
  document.addEventListener('DOMContentLoaded', loadProducts);
})();
</script>
</body>
</html>
